        - "RTF has no component for Style, Tone, or Audience, so a customer-facing announcement where brand voice matters is a poor fit — switching to a framework like CO-STAR (which includes those components) would better preserve the brand voice."
        - "The announcement failed because the Task field was too short."
        - "RTF always produces flat, generic output regardless of the task."
        - "This is unrelated to which framework was used, and is a wording issue unrelated to structure."
