        - "Yes — since the task structure barely varies and the goal is mainly locking in one specific, consistent format, a single clear example is likely enough."
        - "No — one-shot can never lock in a specific output format under any circumstances."
        - "No — this task always requires at least 4 examples regardless of how consistent the structure is."
        - "Yes, but only because JSON is involved, unrelated to task variability."
