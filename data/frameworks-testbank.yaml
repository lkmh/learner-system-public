        - "One-shot — since the task genuinely never varies, a single example is enough to lock in the format, and the extra prep time few-shot requires (writing 3-4 examples) wouldn't add real benefit here."
        - "Neither — a task with no variability should use zero-shot only."
        - "Both approaches are equally wasteful for a task like this."
      answer: 1
      explanation: "Few-shot's benefit comes from covering variation across examples — when a task genuinely has no variation, the additional examples add prep time without addressing any real formatting-drift risk, making one-shot the more efficient, sufficient choice."
      written_prompt: "Explain why one-shot is a more efficient choice than few-shot for a task with a single, unvarying input/output shape."

