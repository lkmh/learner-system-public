  - "question": "Why does CoT prompting typically separate the 'reasoning instruction' from the 'final answer format'?"
    "options":
    - "So the model's exploratory reasoning stays visibly distinct from its concluding answer, letting a reader (or downstream system) reliably locate and use just the final answer without parsing through the reasoning."
    - "Because models cannot generate both reasoning and a final answer within the same response under any circumstances."
    - "Because the reasoning instruction and the final answer format must always contain contradictory content."
    - "Because separating them makes the total response shorter."
    "answer": 0
    "explanation": "The practical reason for a distinct final-answer format (e.g. 'End with Decision: ...') is so the concluding answer can be reliably extracted from the surrounding reasoning text, not because of some technical incompatibility or because it shortens the response."
    "written_prompt": "Explain why a CoT prompt typically asks for a clearly marked final answer (e.g. starting with 'Decision:') separate from the reasoning that leads up to it."
  - "question": "What is a common misconception about what Chain-of-Thought actually changes in the model's process?"
    "options":
    - "That CoT causes the model to consult external tools or databases it wouldn't otherwise have access to."
    - "That CoT prompting changes the training data the model was built on, retroactively."
    - "That CoT guarantees a 100% correct answer on every reasoning task, when in reality it only reduces (not eliminates) the fast-guess failure mode."
    - "That CoT and few-shot are mutually exclusive and can never be combined in the same prompt."
    "answer": 2
    "explanation": "A common overreach is assuming CoT guarantees correctness — it improves accuracy by making the model work through steps explicitly, but it's a mitigation of a failure mode, not a guarantee; the other options misdescribe the mechanism as touching external tools or training data, which it doesn't."
    "written_prompt": "Explain why 'Chain-of-Thought guarantees the model gets the right answer' is an overstatement, and describe what CoT actually does and doesn't guarantee."
