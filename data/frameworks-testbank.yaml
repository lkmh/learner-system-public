- id: zero-shot
  koa: A
  assessment_mode: auto_marked
  questions:
    - question: |
        Task A: "Translate this common English sentence into French."
        Task B: "Output this data as our proprietary internal serialization format: a custom 5-symbol delimiter scheme unique to our company's legacy system."
        Both are prompted zero-shot. Which is more likely to produce a wrong or invented format?
      options:
        - "Task A, since translation is inherently unpredictable."
        - "Task B — with a highly unusual, proprietary format and zero-shot's total reliance on the model's own prior understanding, there's nothing to anchor a correct guess, unlike Task A's common, well-understood task."
        - "Both are equally likely to fail."
        - "Neither is likely to fail, since zero-shot always works."
      answer: 1
      explanation: "Zero-shot relies entirely on the model's own understanding of the task and format. A common task like translation is well anchored by prior training; an obscure proprietary format has nothing to anchor a correct guess."
      written_prompt: "Explain why Task B is a worse fit for zero-shot prompting than Task A."
    - question: |
        A developer needs the model to output a JSON object with fields named exactly `cust_id`, `ord_dt`, and `stat_cd` (unusual, company-specific abbreviations), and prompts it zero-shot with just a plain-English instruction.
        What's the most likely outcome, and why?
      options:
        - "The model will very likely use more standard field names (like customer_id, order_date, status) instead of the exact unusual abbreviations, since zero-shot gives it nothing concrete to anchor those specific names to."
        - "The model will always get the exact field names right regardless of how unusual they are."
        - "The model will refuse to produce any JSON at all."
        - "This has nothing to do with zero-shot and depends only on the model's size."
      answer: 0
      explanation: "Zero-shot provides no worked example to anchor an unusual, company-specific naming convention — the model will likely default to more standard, commonly-seen field names instead."
      written_prompt: "Explain why zero-shot prompting is a risky choice for enforcing unusual, company-specific field names."
    - question: |
        A team needs a prompt to summarize an article in 2-3 sentences — a very common task format the model has seen countless times in training.
        Is zero-shot prompting a reasonable choice here?
      options:
        - "Yes — this is exactly the kind of common, well-understood task zero-shot handles well, since there's no unusual format for the model to guess wrong on."
        - "No — every task requires at least one worked example to succeed."
        - "No — zero-shot can never be used for summarization tasks."
        - "Yes, but only if the article is under 100 words."
      answer: 0
      explanation: "Zero-shot is well suited to quick, common tasks the model already knows well — a standard 2-3 sentence summary has no unusual format requirement, so there's little for the model to get wrong without an example."
      written_prompt: "Explain why zero-shot prompting is a reasonable choice for this summarization task."
    - question: |
        A team zero-shot prompts a model to "format the output as valid YAML" (a well-known, standardized format) versus a separate team that zero-shot prompts for "format the output using our internal XYZ-markup dialect" (an obscure, undocumented-outside-the-company format).
        Which team is taking on more risk, and why?
      options:
        - "The YAML team, since YAML is more complex than XYZ-markup."
        - "The XYZ-markup team — zero-shot depends on the model already knowing the target format from its training; a well-known standard like YAML is far more likely to be understood correctly than an obscure, internal-only format the model has likely never seen."
        - "Both teams face identical risk regardless of format familiarity."
        - "Neither team faces any risk, since zero-shot always succeeds for formatting tasks."
      answer: 1
      explanation: "Zero-shot's success hinges on the model already having internalized the target format from training — a widely-documented public standard like YAML is far safer than an obscure, company-internal format with no public documentation to draw on."
      written_prompt: "Explain why prompting zero-shot for an obscure internal format carries more risk than prompting for a well-known public standard like YAML."

- id: one-shot
  koa: A
  assessment_mode: auto_marked
  questions:
    - question: |
        A one-shot prompt for classifying emails as "urgent" or "not urgent" is given a single example: an email about a server outage, labeled "urgent."
        The prompt is then used on an email about a minor typo in a internal wiki page, and the model labels it "urgent" as well.
        What's the most likely explanation?
      options:
        - "The model is fundamentally incapable of distinguishing urgency levels."
        - "The single example anchored the model too closely to that one case's characteristics, rather than teaching it a generalizable notion of what makes something urgent — a risk one-shot carries when the real task varies."
        - "This is unrelated to the number of examples and is a random error."
        - "This proves email classification can never be automated."
      answer: 1
      explanation: "This is one-shot's overfitting risk in action: a single example doesn't teach a generalizable pattern, so the model can latch onto surface features of that one case rather than the actual underlying concept of urgency."
      written_prompt: "Explain why giving only one example risked the model overgeneralizing from that specific case."
    - question: |
        A team needs a model to always format a response as a single JSON object with exactly the keys `title` and `summary`, and nothing else. The task itself (summarizing an article) doesn't vary much in structure across different inputs.
        Is one-shot likely to be sufficient here?
