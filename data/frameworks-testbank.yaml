- "id": "zero-shot"
  "koa": "K"
  "assessment_mode": "auto_marked"
  "questions":
  - "question": "Why does zero-shot prompting risk producing the wrong output format?"
    "options":
    - "Because the model has no worked example to anchor the exact format, so it must guess based on its own prior understanding of the task."
    - "Because zero-shot prompts are always too short for the model to parse correctly."
    - "Because the model refuses to respond unless at least one example is provided."
    - "Because zero-shot prompting disables the model's ability to follow any instructions at all."
    "answer": 0
    "explanation": "Zero-shot relies entirely on the model's own understanding of the task and format, with nothing to anchor an unusual or highly specific format — that's exactly where it can guess wrong."
    "written_prompt": "In your own words, explain why a zero-shot prompt can produce an unexpected output format, and what would make that risk higher or lower."
  - "question": "A team wants the fastest possible prompt for a task the model already handles well and commonly. Why is zero-shot a good fit here?"
    "options":
    - "Because zero-shot always outperforms few-shot regardless of task."
    - "Because there's no setup cost and no examples to write, and the model's prior knowledge of a common task is already reliable enough."
    - "Because zero-shot prompts are shorter and therefore always cheaper to run, which is the only consideration that matters."
    - "Because common tasks require more examples to work correctly, so zero-shot is only for rare tasks."
    "answer": 1
    "explanation": "Zero-shot's advantage is speed/no setup cost, which pays off specifically when the task is common and well understood by the model already — not a universal performance claim."
    "written_prompt": "Explain the specific situation where zero-shot prompting is the right tool, and why it stops being the right tool once the format gets unusual."
  - "question": "What is a common misconception about zero-shot prompting?"
    "options":
    - "That it never works for any task without an example."
    - "That adding one example to a zero-shot prompt turns it into one-shot, changing its risk profile."
    - "That zero-shot prompts are less clear or more vague than prompts with examples, when in fact the instruction itself must do all the anchoring work."
    - "That zero-shot means giving the model zero instructions at all, rather than zero examples."
    "answer": 3
    "explanation": "A common confusion is thinking 'zero-shot' means no instruction is given — in fact the instruction is still explicit and clear; it's specifically the example count that is zero."
    "written_prompt": "Someone says 'zero-shot prompting means you just give the model a vague, open-ended request.' Correct this misunderstanding."
  - "question": "Why might a highly specific, unusual output format be a bad candidate for zero-shot prompting?"
    "options":
    - "Because unusual formats always exceed the model's context window."
    - "Because the model has nothing to anchor its guess to, so it may default to a more familiar, generic format instead of the specific one requested."
    - "Because zero-shot prompting is incompatible with any format instructions whatsoever."
    - "Because unusual formats require the Chain-of-Thought framework specifically, and no other framework can produce them."
    "answer": 1
    "explanation": "With no example, the model must infer the format purely from the instruction's wording, and an unusual/specific shape is exactly where that inference is most likely to default to something generic and wrong."
    "written_prompt": "Explain why asking for an unusual, highly specific output format is a weak spot for zero-shot prompting specifically, compared to one-shot or few-shot."
- "id": "one-shot"
  "koa": "K"
  "assessment_mode": "auto_marked"
  "questions":
  - "question": "Why is one-shot prompting especially useful for enforcing a specific output format?"
    "options":
    - "Because a single demonstrated example gives the model a concrete pattern to match, which is more reliable than describing the format in words alone."
    - "Because one-shot prompts are always shorter than zero-shot prompts."
    - "Because the model ignores the instruction entirely and only copies the example verbatim."
    - "Because one example guarantees perfect accuracy on every subsequent input, no matter how different."
    "answer": 0
    "explanation": "A single worked example gives the model a concrete, demonstrated pattern to imitate, which locks in a format more reliably than a purely verbal description — but it does not guarantee perfection on every future input, which rules out the overreaching claim."
    "written_prompt": "Explain why showing one example of the input/output pattern helps lock in a format better than just describing the format in words."
  - "question": "What is the main risk of using one-shot prompting when the real task varies a lot from case to case?"
    "options":
    - "The model may overfit to the specifics of that single example, applying details that don't generalize to different inputs."
    - "The model will refuse to process any input that doesn't match the example exactly."
    - "One-shot prompts cannot handle any variation at all, even superficial wording changes."
    - "The prompt will exceed the model's maximum context length."
    "answer": 0
    "explanation": "With only one example to generalize from, the model risks anchoring too tightly to that example's particular details rather than the underlying pattern — that's the overfitting risk the framework's own guidance calls out."
    "written_prompt": "Describe a scenario where giving the model just one example could backfire because the real inputs vary too much, and explain why."
  - "question": "A learner believes one-shot prompting means giving the model exactly one instruction. What's the actual meaning?"
    "options":
    - "One-shot means giving exactly one complete input->output example pair before the real task, in addition to the instruction — not restricting the number of instructions."
    - "One-shot means the model gets only one attempt to answer, with no retries permitted by the API."
    - "One-shot and zero-shot are the same technique with different names."
    - "One-shot means the prompt must be exactly one sentence long."
    "answer": 0
    "explanation": "'Shot' refers to the number of demonstrated examples, not instructions, attempts, or prompt length — one-shot means exactly one worked example."
    "written_prompt": "Correct this misunderstanding: 'One-shot prompting just means keeping your prompt really short, like one sentence.'"
  - "question": "Compared to few-shot, what trade-off does one-shot make?"
    "options":
    - "One-shot takes more prep time than few-shot but produces less consistent output."
    - "One-shot is faster to prepare than few-shot (only one example needed) but provides less coverage of format variation, since a single example can't demonstrate multiple valid shapes."
    - "One-shot and few-shot have no meaningful differences in either prep time or reliability."
    - "One-shot always produces more accurate results than few-shot because there's less for the model to get confused by."
    "answer": 1
    "explanation": "One-shot's single example is cheaper to write but demonstrates only one instance of the pattern, whereas few-shot's multiple examples reduce formatting drift at the cost of more prep time — that's the actual trade-off, not a blanket accuracy claim."
    "written_prompt": "Explain the trade-off a prompt writer is making when they choose one-shot over few-shot for a task with a moderately varied set of possible inputs."
- "id": "few-shot"
  "koa": "K"
  "assessment_mode": "auto_marked"
  "questions":
  - "question": "Why does few-shot prompting generally produce more consistent structured output than one-shot?"
    "options":
    - "Because multiple examples show the range of valid variation in the pattern, reducing the chance the model latches onto one example's incidental specifics as if they were required."
    - "Because few-shot prompts are always shorter than one-shot prompts, which models process more accurately."
    - "Because few-shot disables the model's own prior knowledge, forcing it to rely purely on the examples."
    - "Because more examples always means the model spends less time processing the request."
    "answer": 0
    "explanation": "Multiple examples reveal what varies and what stays fixed across the pattern, which is precisely what reduces the formatting drift that a single example can't rule out."
    "written_prompt": "Explain why 2-4 examples generally produce more reliable structured output than a single example, using the idea of 'formatting drift.'"
  - "question": "When is few-shot prompting the wrong choice, according to its own stated trade-offs?"
    "options":
    - "When prototyping quickly, since writing 3 good examples takes real prep time that may not be worth spending yet."
    - "Whenever the task involves JSON output, since few-shot cannot produce structured formats."
    - "When the model already performs the task well without any examples, which few-shot can never handle."
    - "Never — few-shot is strictly better than zero-shot and one-shot in every situation."
    "answer": 0
    "explanation": "Few-shot's own trade-off is prep time: writing several good examples is real work, which makes it a poor fit specifically during fast prototyping — it's not a blanket 'always better' technique."
    "written_prompt": "Describe a situation where the extra prep time required by few-shot prompting outweighs the consistency benefit it offers."
  - "question": "What distinguishes few-shot from one-shot, beyond simply 'more examples'?"
    "options":
    - "Few-shot examples must always contradict each other to teach robustness."
    - "Few-shot typically supplies 2-4 examples specifically to demonstrate the range of the pattern across varied inputs, which a single one-shot example cannot show by itself."
    - "Few-shot removes the instruction from the prompt entirely, relying only on examples."
    - "Few-shot and one-shot are identical; the naming difference is purely stylistic."
    "answer": 1
    "explanation": "The functional difference is coverage: several examples can show variation across cases (e.g. different urgency levels or different product types) that one single example structurally cannot represent."
    "written_prompt": "Explain what additional teaching value a third example adds to a few-shot prompt that a single one-shot example could not provide on its own."
  - "question": "A learner assumes that using 10 examples instead of 3 will always improve a few-shot prompt further. What's the more accurate view?"
    "options":
    - "More examples always linearly improve reliability with no downside, so 10 is strictly better than 3."
    - "Few-shot's benefit comes from covering the real range of variation efficiently; beyond covering that range, additional examples mainly add prep time and prompt length without a guaranteed further consistency gain."
    - "Only exactly 3 examples work; any other count breaks the technique."
    - "10 examples would automatically convert the prompt into a fine-tuning run instead of a prompt."
    "answer": 1
    "explanation": "Few-shot is described as 'usually 2-4' precisely because the goal is covering the real range of variation, not maximizing example count — past that point, extra examples mostly cost prep time and prompt length rather than guaranteeing further gains."
    "written_prompt": "Push back on the claim that 'more few-shot examples is always better.' What's a more accurate way to think about how many examples to include?"
- "id": "rgc"
  "koa": "K"
  "assessment_mode": "auto_marked"
  "questions":
  - "question": "Why does RGC's tagline describe it as 'minimal setup, still noticeably better than zero-shot'?"
    "options":
    - "Because RGC requires writing several full examples, just like few-shot, but frames them differently."
    - "Because naming just three slots — Role, Goal, Context — gives the model meaningfully more grounding than a bare instruction, without the time cost of a 6-part framework like CO-STAR."
    - "Because RGC secretly includes hidden Steps and Format fields that zero-shot lacks."
    - "Because RGC is only usable for customer support tasks, which are inherently easier than other domains."
    "answer": 1
    "explanation": "RGC's value proposition is a small amount of explicit structure (who/what/why) for very little added effort — enough to beat a bare zero-shot instruction without the overhead of a fuller framework."
    "written_prompt": "Explain why adding just three labeled fields (Role, Goal, Context) tends to improve a prompt's reliability compared to zero-shot, without requiring anywhere near CO-STAR's full setup."
  - "question": "Why does RGC's own guidance say to avoid it for multi-step or strictly formatted tasks?"
    "options":
    - "Because RGC has no component for describing an ordered process (like RISEN's Steps) or an exact output shape (like CO-STAR's Response format or RTF's Format), so those needs go unaddressed."
    - "Because RGC prompts are limited to exactly 50 words by design."
    - "Because the Role component cannot be combined with any Goal component."
    - "Because RGC is only compatible with creative writing tasks, never technical ones."
    "answer": 0
    "explanation": "RGC's three components (Role, Goal, Context) simply don't include a process or format slot — the gap isn't a length limit or domain restriction, it's a structural absence of those specific components."
    "written_prompt": "Explain specifically what kind of task requirement RGC has no component for, and why that gap matters for multi-step tasks."
  - "question": "What is the Context component of RGC meant to supply, as distinct from Role and Goal?"
    "options":
    - "The background information the model needs to know to act on the Goal correctly — distinct from who it should act as (Role) or what it should achieve (Goal)."
    - "A restatement of the Goal in different words, to reinforce the instruction."
    - "The exact format the output must take, functioning the same as CO-STAR's Response format."
    - "A list of banned words or actions, functioning the same as RISEN's Narrowing."
    "answer": 0
    "explanation": "Context is specifically the situational background the model needs (e.g. facts about the customer or scenario) — it is neither a restated goal, a format spec, nor a constraints list; those belong to other frameworks' components."
    "written_prompt": "In your own words, describe what belongs in RGC's Context field, and give an example of information that would NOT belong there because it actually belongs in Role or Goal instead."
  - "question": "A learner uses RGC for a task requiring a strict 4-field JSON output. What's the most accurate assessment?"
    "options":
    - "RGC handles this perfectly since Context can double as a format specification."
    - "RGC has no dedicated format component, so the strict structure isn't guaranteed by the framework itself — a framework with an explicit format slot (RTF, CO-STAR, or ICIO) would better guarantee it."
    - "This is impossible to prompt for with any framework other than few-shot."
    - "RGC's Goal field is specifically designed to enforce JSON schemas."
    "answer": 1
    "explanation": "None of Role, Goal, or Context is a dedicated format slot — while a prompt writer could stuff format instructions into Goal or Context as a workaround, RGC's own design doesn't guarantee structure the way a framework with an explicit Format/Response format/Output component does."
    "written_prompt": "Explain why RGC is a weaker choice than RTF or CO-STAR specifically for a task that needs a strict, exact output format."
