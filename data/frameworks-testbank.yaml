        - "CO-STAR — its 6 components are always faster to fill in than RTF's 3."
        - "RISEN — its Steps and Narrowing components are the fastest way to add structure to any task."
        - "None of these frameworks are ever faster than zero-shot."
      answer: 0
      explanation: "RTF is explicitly designed as the fastest possible structured prompt — a step up from zero-shot without CO-STAR's overhead — which is exactly right when tone and audience aren't relevant to the outcome."
