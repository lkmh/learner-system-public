      explanation: "One-shot is well suited exactly to this case: you need one specific output format, and the task doesn't vary enough to risk overfitting to the example's specifics."
      written_prompt: "Explain why one-shot prompting is likely sufficient for this consistent, low-variability task."
    - question: |
        A one-shot prompt is used to extract key facts from news articles, using a politics article as the single example. When run on a completely different domain — a sports article — the model tries to force in political-sounding categories that don't apply.
        What does this illustrate, and what would help?
      options:
        - "This illustrates one-shot's overfitting risk on a genuinely varied task; adding a few more examples spanning different domains (few-shot) would help the model generalize the extraction pattern rather than the one example's specific domain."
        - "This proves the model can never process sports articles."
        - "This is unrelated to example count and is caused by the model's training data cutoff."
        - "The fix is to remove all examples and use zero-shot instead."
      answer: 0
      explanation: "This is a direct instance of one-shot overfitting to its single example's domain — since the real task varies across domains, additional varied examples (few-shot) would generalize the pattern better than one narrow example."
      written_prompt: "Explain why the sports-article failure happened, and why adding more varied examples would help more than removing examples entirely."
    - question: |
        Compare: Task A always produces the exact same kind of output structure regardless of input (e.g. always extracting a name and a date). Task B's correct output structure varies significantly depending on what kind of document is given.
        Which task is a better fit for one-shot prompting, and why?
      options:
        - "Task A — a single example is enough to lock in a format that barely varies, unlike Task B, where one example risks anchoring the model to a structure that doesn't fit every case."
        - "Task B — one-shot is specifically designed for highly variable tasks."
        - "Both tasks are equally good fits for one-shot prompting."
        - "Neither task is suitable for one-shot; only zero-shot applies to extraction tasks."
      answer: 0
      explanation: "One-shot works best when a single example is enough to capture the pattern — that's Task A's low-variability case. Task B's high variability is exactly where one-shot's overfitting risk shows up, and few-shot would generalize better."
      written_prompt: "Explain why Task A's consistency makes it a better one-shot candidate than Task B's variability."

