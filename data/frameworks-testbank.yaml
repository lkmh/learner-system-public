      explanation: "Scenario A has a clean, nameable input (the log file), context (the mapping spec), instruction (reformat), and output (normalized JSON) — exactly ICIO's strength. Scenario B has no such clean split to name."
      written_prompt: "Explain why Scenario A fits ICIO naturally while Scenario B does not."
    - question: |
