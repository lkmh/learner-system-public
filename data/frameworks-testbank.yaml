        - "No, because chain-of-thought actively lowers accuracy on every task."
      answer: 1
      explanation: "This matches the lesson's guidance directly: simple factual lookups or creative writing don't benefit from chain-of-thought, and applying it universally adds unnecessary token cost and latency without any accuracy gain on those tasks."
      written_prompt: "Explain why applying chain-of-thought to every prompt, including simple lookups, is not a good default policy."
    - question: |
        A model is asked to solve a logic puzzle with several interdependent clues, and without any reasoning instruction, jumps straight to a guess that turns out to be wrong. When re-prompted with an explicit chain-of-thought instruction, it correctly works through each clue in turn and lands on the right answer.
        What does this comparison illustrate?
      options:
        - "That chain-of-thought has no measurable effect on multi-step logic problems."
        - "That explicitly asking the model to reason step by step, rather than jump to a final answer, can catch and avoid the kind of shortcut error that produced the wrong guess on this multi-clue logic puzzle."
        - "That the model is fundamentally incapable of solving logic puzzles under any circumstances."
        - "That this has nothing to do with reasoning instructions and is purely random."
      answer: 1
      explanation: "This is a clean before/after demonstration of chain-of-thought's core benefit: working through interdependent clues explicitly, instead of jumping to a guess, catches errors that a shortcut answer would miss."
      written_prompt: "Explain what this before/after comparison demonstrates about the value of an explicit reasoning instruction for this logic puzzle."
    - question: |
        A creative writing prompt asks a model to "write a whimsical two-sentence story about a cat astronaut." A team adds "think step by step before answering" to this prompt, expecting better output.
        Is this addition likely to help?
      options:
        - "Yes — chain-of-thought universally improves the quality of any generated text."
        - "Probably not — this is a creative, non-reasoning task with no multi-step calculation or logical dependency to work through, so an explicit reasoning instruction is unlikely to improve it and mainly adds unnecessary tokens and time."
        - "Yes, because whimsical writing always requires more explicit reasoning than serious writing."
        - "No, because chain-of-thought only works on prompts under 10 words."
      answer: 1
      explanation: "Chain-of-thought's benefit comes from catching mistakes in multi-step reasoning — a short creative story has no such steps to get wrong, so the instruction mainly adds cost without a meaningful quality benefit."
      written_prompt: "Explain why adding a chain-of-thought instruction is unlikely to meaningfully improve this creative writing task."

- id: rtf
