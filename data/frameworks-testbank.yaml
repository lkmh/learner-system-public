- id: icio
  koa: A
  assessment_mode: auto_marked
  questions:
    - question: |
        Scenario A: "Given this raw log file (Input) and our field-mapping spec (Context), extract and reformat the entries into normalized JSON records (Instruction/Output)."
        Scenario B: "Should I take this job offer or stay at my current company?"
        Which scenario is a natural fit for ICIO, and why?
      options:
        - "Scenario A — there's a clean, nameable Input, Context, Instruction, and Output for this data-transformation task, unlike Scenario B's open-ended advisory question with no single clean input or output."
        - "Scenario B — ICIO is specifically designed for open-ended personal advice questions."
        - "Both scenarios fit ICIO equally naturally."
        - "Neither scenario fits ICIO, since it only applies to numeric data."
