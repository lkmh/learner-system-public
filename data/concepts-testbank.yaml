- id: knowledge-cutoff
  koa: A
  assessment_mode: auto_marked
  questions:
    - question: |
        A user asks a no-web-access chatbot: "Who won yesterday's football match?" The bot replies: "I don't have information on events that recent — my knowledge has a cutoff and I can't confirm this."
        What's the correct diagnosis of this behavior?
      options:
        - "The chatbot is broken and should be restarted to refresh its knowledge."
        - "This is expected, honest behavior for a model with a fixed knowledge cutoff and no live search access — it's correctly reporting the limits of its frozen training data rather than guessing or fabricating."
        - "The chatbot is refusing out of a content-policy violation unrelated to knowledge cutoff."
        - "The chatbot's temperature setting must be set too low, causing the refusal."
      answer: 1
      explanation: "This is the exact honest-uncertainty behavior described for a frozen-cutoff model with no search — not a malfunction, policy refusal, or a temperature issue."
      written_prompt: "Explain why the chatbot's refusal to answer about yesterday's match is expected, correct behavior rather than a bug."
    - question: |
        Two setups answer the same question, "What's the latest version of a popular software library?":
        Setup 1 (no tools): guesses based on training data, naming an outdated version.
        Setup 2 (web search enabled): correctly names the current version, citing a page it just fetched.
        What changed between the two setups?
      options:
        - "Setup 2's underlying model was retrained with a newer cutoff date just for this question."
        - "Setup 2 fetched live web content and read it as extra context before answering — its underlying training data and cutoff are unchanged; it isn't 'remembering' anything new."
        - "Setup 1 is using a fundamentally different, worse-quality base model."
        - "Setup 2's higher temperature setting made it luckier at guessing the right version."
      answer: 1
      explanation: "Nothing about Setup 2's training or cutoff changed — the only difference described is that it fetched and read fresh material at request time, exactly the workaround mechanism from the lesson."
      written_prompt: "Explain the actual mechanism that let Setup 2 answer correctly, and why it does not mean the model's knowledge cutoff moved forward."
    - question: |
        A company advertises: "Our chatbot's knowledge is always 100% up to date because it was trained yesterday."
        Six months later, without retraining, the same chatbot (still with no search tool) is asked about something from last week and answers confidently, but incorrectly.
        What does this reveal?
      options:
        - "The chatbot's cutoff automatically extends forward in time on its own, so this shouldn't be possible."
        - "The chatbot's knowledge is frozen at its original training cutoff; six months on, without retraining or search access, it has no way to know about anything after that point, and any confident answer about recent events is a guess, not real knowledge."
        - "The chatbot must have secretly been given web access without being advertised as such."
        - "This proves knowledge cutoff is a marketing myth with no real effect on behavior."
      answer: 1
      explanation: "A knowledge cutoff doesn't move forward automatically just because time passes — without retraining or a search tool, the gap between 'now' and the cutoff only grows, and confident answers about things after it are guesses, consistent with the fabrication-risk behavior described in the lesson."
      written_prompt: "Explain why the chatbot's confident-but-wrong answer six months later is consistent with (not a contradiction of) how knowledge cutoffs work."
    - question: |
        A developer wants to give a model up-to-date stock prices without retraining it. They propose fetching the current price via an API and inserting it into the model's context right before it answers.
        Does this correctly work around the knowledge-cutoff limitation?
      options:
        - "No — only retraining the entire model can ever incorporate new information."
        - "Yes — this is exactly the same pattern as the web-search workaround: supplying fresh external data as extra context at request time, without changing the model's frozen training or cutoff."
        - "No — inserting external data into context is technically impossible for any model."
        - "Yes, but only if the model's temperature is also set to zero."
      answer: 1
      explanation: "This is precisely the mechanism described for working around knowledge cutoff — feed fresh data into context at request time — whether that data comes from a search engine or a direct API call makes no difference to the underlying pattern."
      written_prompt: "Explain why fetching a live stock price and inserting it into context is a valid workaround for the model's knowledge cutoff, using the same reasoning as the web-search example."

