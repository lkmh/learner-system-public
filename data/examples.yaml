- title: Analyze an investment portfolio's allocation and returns
  category: Data & analysis
  suitable_llms: [Claude]
  description: |
    For a personal or client portfolio CSV — calculates weighting, concentration risk, and overall return without needing a brokerage's built-in analytics. With real money on the line, Claude computes every figure here via a tool call rather than mental math — this is not a place to let an LLM "estimate."
  prompt: |
    Using the attached CSV of portfolio holdings, calculate each position's weight as a percentage of the total current portfolio value, the unrealized gain/loss in dollars and percent for each holding, and the overall portfolio return. Flag any single position that makes up more than 25% of the portfolio as a concentration risk.
  sample_input: |
    [ATTACH: portfolio.csv]
    ticker,shares,cost_basis,current_price
    AAPL,50,145.00,192.00
    VOO,20,380.00,410.00
    TSLA,30,220.00,175.00
    BND,100,72.00,70.50
  sample_output: |
    🛠️ *Real dollar figures, not estimates — Claude runs a script against the numbers rather than computing portfolio math by "feel."*

    ```python
    import pandas as pd
    df = pd.read_csv("portfolio.csv")
    df["value"] = df.shares * df.current_price
    df["cost"] = df.shares * df.cost_basis
    df["weight"] = df.value / df.value.sum()
    df["gain_loss"] = df.value - df.cost
    df["gain_loss_pct"] = df.gain_loss / df.cost
    ```

    **Tool result:** exact weight and gain/loss per position, computed from the real share counts and prices — no rounding-by-eye.

    | Ticker | Weight | Gain/Loss | Gain/Loss % |
