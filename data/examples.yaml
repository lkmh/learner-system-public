- title: Check if an A/B test result is meaningful
  category: Data & analysis
  suitable_llms: [Claude]
  description: |
    Translates a raw test result CSV into a plain-English verdict on whether the difference between variants is likely real or just noise. Claude calculates the conversion rates and lift via a tool call — this is a case where getting the ratio slightly wrong could send you the wrong verdict entirely.
  prompt: |
    Using the attached CSV of A/B test results, calculate the conversion rate for each variant and the relative lift of the variant over control. Explain in plain English whether the sample size looks large enough to trust this result, and what you'd want to see before rolling out the winner to 100% of users.
  sample_input: |
    [ATTACH: ab_test.csv]
    variant,visitors,conversions
    Control,5000,410
    Variant B,5050,468
  sample_output: |
    🛠️ *A wrong-by-a-hair ratio here could flip the verdict — Claude computes the rates and lift with code rather than approximating them.*

    ```python
    import pandas as pd
    df = pd.read_csv("ab_test.csv")
    df["conv_rate"] = df.conversions / df.visitors
    lift = df.conv_rate.iloc[1] / df.conv_rate.iloc[0] - 1
    ```

    **Tool result:** exact conversion rates and lift, calculated from the raw counts.

    | Variant | Visitors | Conversions | Conversion rate |
    |---|---|---|---|
    | Control | 5,000 | 410 | 8.2% |
    | Variant B | 5,050 | 468 | 9.3% |

    **Relative lift:** Variant B converts about 13.1% better than Control.

    With roughly 5,000 visitors per variant and about a 1-point difference in conversion rate, this is in a reasonable range to be a real effect rather than pure noise, but it's not an overwhelming margin. Before rolling out to 100%, I'd want to see the test run for at least one full business cycle (including weekends) and confirm the lift holds up in a formal significance test rather than relying on the raw percentages alone.
  addons:
    - type: Depth
      color: blue
      options:
        - label: Run an actual significance test
          text: "Calculate an actual statistical significance test (e.g. a two-proportion z-test) and report the p-value, not just a plain-English gut check."
    - type: Segment
      color: purple
      options:
        - label: By device type
          text: "If a device-type column exists, break the results down separately for mobile vs. desktop."

- title: Find anomalies in a transaction ledger
  category: Data & analysis
  suitable_llms: [Claude]
  description: |
    A lightweight reconciliation pass — spots duplicate charges, round-number outliers, and miscategorized entries in a raw transaction export. On a real ledger with hundreds of rows, Claude groups and filters this with code rather than scanning by eye, so nothing gets missed.
  prompt: |
    Using the attached CSV of transactions, flag anything that looks like a likely duplicate charge (same amount and vendor within a few days of each other), any transaction that's unusually large compared to the rest in its category, and any transaction where the category looks mismatched to the vendor name. List each flag with a one-line reason.
  sample_input: |
    [ATTACH: transactions.csv]
    date,vendor,category,amount
    2025-06-01,AWS,Software,1200
    2025-06-02,AWS,Software,1200
    2025-06-03,Staples,Office Supplies,45
    2025-06-05,Delta Airlines,Office Supplies,890
    2025-06-10,Software,Marketing,300
  sample_output: |
    🛠️ *Beyond a handful of rows, "scan for duplicates by eye" stops being reliable — Claude groups and filters the data with code instead.*

    ```python
    import pandas as pd
    df = pd.read_csv("transactions.csv")
    dupes = df[df.duplicated(subset=["vendor", "amount"], keep=False)]
    category_avg = df.groupby("category").amount.transform("mean")
    outliers = df[df.amount > category_avg * 3]
    ```

    **Tool result:** the exact duplicate pair and the exact category outlier, found by the script rather than a visual scan.

    **Likely duplicate:** AWS charged $1,200 on both June 1 and June 2 — same vendor, same amount, one day apart.

    **Unusually large for category:** Delta Airlines, $890 under "Office Supplies" — that's an airline charge, not office supplies, and far above the ~$45 typical for that category.

    **Category/vendor mismatch:** vendor listed simply as "Software" under category "Marketing" — this looks like the vendor name and category were swapped or mis-entered.
  addons:
