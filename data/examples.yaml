- title: Write a follow-up email after a sales call
  category: Sales & customer-facing
  suitable_llms: [Claude, ChatGPT, Copilot]
  description: |
    Keeps momentum after a sales call by turning your rough notes into a polished, action-oriented follow-up.
  prompt: |
    Write a follow-up email to the prospect based on the call notes below. Thank them for their time, recap the 2-3 key points discussed, and end with one clear next step. Keep it under 100 words.
  sample_input: |
    [ATTACH: call_notes.txt]
    Spoke with Jamie (Head of Ops) for 30 min. Main pain point: manual data entry between two systems. Interested in our API integration, budget likely available in Q3. Wants a demo with their tech lead before deciding.
  sample_output: |
    Hi Jamie, thanks for the time today. It sounds like the manual data entry between your two systems is the biggest pain point, and our API integration is a strong fit for that. Since budget opens up in Q3 and your tech lead should be part of the decision, let's set up a technical demo together — does next Tuesday or Wednesday work?
