          text: "For each flag, suggest the specific correction (e.g. which category it probably should be)."

- title: Find which marketing channel is actually driving revenue
  category: Data & analysis
  suitable_llms: [Claude]
  description: |
    A simple correlation pass across channels — useful before a budget-reallocation conversation, without needing a full attribution model. Real correlation coefficients come from a tool call, not from Claude "sensing" which lines move together.
  prompt: |
    Using the attached CSV of weekly spend by channel and total weekly revenue, identify which channel's spend correlates most strongly with revenue changes week to week. Note that correlation isn't the same as proof of causation, and mention one confounding factor that could be affecting the result.
  sample_input: |
    [ATTACH: channel_revenue.csv]
    week,search_spend,social_spend,email_spend,revenue
    1,4000,3000,200,52000
    2,4500,3200,220,55000
    3,3800,4500,210,54500
    4,5200,3100,250,58000
    5,4900,3400,240,57500
  sample_output: |
    🛠️ *"Which line moves with revenue" is a correlation calculation, not a vibe — Claude runs it as code.*

    ```python
    import pandas as pd
    df = pd.read_csv("channel_revenue.csv")
    df[["search_spend", "social_spend", "email_spend"]].corrwith(df.revenue)
    ```

    **Tool result:** search spend has the highest correlation with revenue of the three channels.

    Search spend shows the strongest week-to-week relationship with revenue — the highest-search weeks (4 and 5) also had the highest revenue, while the lower-search Week 3 underperformed despite a social spend increase that week.

    **Caveat:** this is a correlation across only 5 weeks, which is a small sample, and doesn't prove search spend *causes* the revenue — a confounding factor like a seasonal demand spike (e.g. a holiday week) could be driving both search spend and revenue up at the same time.
  addons:
    - type: Depth
      color: blue
      options:
        - label: Calculate actual correlation coefficients
          text: "Calculate the actual Pearson correlation coefficient between each channel's spend and revenue, not just a qualitative read."
    - type: Visualization
      color: green
      options:
        - label: Add a scatter plot
          text: "Also generate a scatter plot of search spend vs. revenue across the 5 weeks, as an artifact if your tool supports it."
