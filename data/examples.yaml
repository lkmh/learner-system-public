- title: Draft a customer complaint response
  category: Sales & customer-facing
  suitable_llms: [Claude, ChatGPT]
  description: |
    A quick way to draft a professional, empathetic reply to an upset customer without starting from a blank page.
  prompt: |
    Write a reply to the customer email below. Acknowledge the issue, apologize once, explain the fix, and offer a small goodwill gesture. Keep it under 120 words, warm but professional.
  sample_input: |
    [ATTACH: customer_email.txt]
    "My order #4021 arrived 5 days late and the box was damaged. This is the second time this has happened. Very disappointed."
  sample_output: |
    Hi [Name], I'm really sorry order #4021 arrived late and damaged — especially given this isn't the first time. I've flagged this with our warehouse team to prevent a repeat, and I've issued a **full refund on the shipping cost** plus a **15% discount code** for your next order. Thank you for your patience, and please reach out directly if anything else comes up.
  addons:
    - type: Tone
      color: blue
      options:
        - label: Formal
          text: "Use a formal, corporate tone."
        - label: Warm & personal
          text: "Use a warm, personal tone as if written by a real person, not a template."
    - type: Goodwill gesture
      color: orange
      options:
        - label: Discount code
          text: "Offer a 15% discount code on their next order."
        - label: Free shipping
          text: "Offer free shipping on their next two orders."
        - label: No gesture
          text: "Do not offer any discount or compensation — just acknowledge and apologize."
    - type: Length
      color: green
      options:
        - label: Short (80 words)
          text: "Keep the email under 80 words."
        - label: Standard (120 words)
          text: "Keep the email under 120 words."

