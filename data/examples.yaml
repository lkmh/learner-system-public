        - label: Direct and brief
          text: "Use a direct, no-fluff tone."
    - type: Call to action
      color: orange
      options:
        - label: Book a demo
          text: "End with a specific ask to book a technical demo."
        - label: Send more info
          text: "End by offering to send a one-page product overview instead of asking for a meeting."

