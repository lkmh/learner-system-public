# ============================================================
# EXAMPLE LIBRARY
# Add as many entries as you like. Each one becomes a card in
# the "Library" tab, grouped by `category` — and its `addons`
# power the "Prompt Builder" section right below it, so the
# builder is always enhancing the SAME example you're looking at.
#
# Categories currently in use (4 professional, 4 personal):
#   Work communication, Data & analysis, Career & job search,
#   Sales & customer-facing, Travel & planning, Health & routines,
#   Money & admin, Learning & hobbies
# Feel free to add new categories — any string works.
#
# IMPORTANT — writing prompt / sample_input / description text:
# Write each paragraph or bullet as ONE continuous line in the
# YAML, even if it looks long in your editor. The page reflows
# text to fit the box automatically (like Word wrap) — if you
# manually break a sentence across multiple lines here, those
# breaks get shown AS-IS on the page and will look like the text
# is wrapping too early, leaving empty space on wide screens.
# Only use a real line break where you want an actual new line
# (e.g. between separate bullets or numbered steps).
#
# Fields:
#   title          - shown in the second dropdown
#   category       - shown in the first dropdown (grouping)
#   suitable_llms  - list of LLMs this example works well with,
#                    shown as small badges at the top of the card.
#                    Free text, e.g. [Claude, ChatGPT, Copilot, Any]
#   description    - one or two sentences explaining when/why to
#                    use this prompt. Shown above the prompt box.
#   prompt         - the exact prompt text (copy button uses this)
#   sample_input   - optional. Text shown as "sample input / attachment".
#                    Leave blank ("") if the prompt needs no input.
#   sample_output  - optional. Pre-generated model output, hidden
#                    behind a "Show sample output" toggle. Supports
#                    markdown (bold, lists, tables) — it's rendered,
#                    not shown as raw text, and reflows on its own.
#   addons         - optional list of enhancement "types" for the
#                    Prompt Builder. Each type is a RADIO GROUP —
#                    learners pick ONE option per type (or "None").
#                    Selected options are appended to the base
#                    `prompt` above, highlighted in `color`.
#                    Allowed colors: blue, orange, green, purple, pink
#                      - type   : the group label (e.g. "Formatting")
#                      - color  : highlight color for every option in this group
#                      - options: list of {label, text}
#                        - label: shown next to the radio button
#                        - text : sentence appended to the compiled prompt
# ============================================================

# ---------------- PROFESSIONAL: Work communication ----------------

- title: Summarize meeting minutes
  category: Work communication
  suitable_llms: [Claude, ChatGPT, Copilot]
  description: |
    Turn a page of raw meeting notes into something skimmable for people who weren't in the room — decisions, owners, and open questions only.
  prompt: |
    Summarize the following meeting minutes into three sections:
    1. Key decisions made
    2. Action items (with owner and due date if mentioned)
    3. Open questions that still need answers

    Keep it under 150 words.
  sample_input: |
    [ATTACH: sample_meeting_minutes.txt]
    Attendees: Priya, Marcus, Wei Ling, Daniel
    - Discussed Q3 marketing budget, agreed to shift $10k from print to paid social. Wei Ling to confirm final numbers by Friday.
    - Marcus raised concern about the new CRM rollout timeline. Daniel to check with vendor and report back next week.
    - Decided to postpone the customer survey until after the product launch.
    - Open question: who owns the launch day social media calendar?
  sample_output: |
    **Key decisions:**
    - Shift $10k from print to paid social (Q3)
    - Postpone customer survey until after launch

    **Action items:**

    | Owner | Task | Due |
    |---|---|---|
    | Wei Ling | Confirm final ad budget numbers | Friday |
    | Daniel | Check CRM rollout timeline with vendor | Next week |

    **Open questions:** Who owns the launch day social media calendar?
  addons:
    - type: Format
      color: green
      options:
        - label: Table
          text: "Format the action items as a markdown table with columns: Owner, Task, Due."
        - label: Numbered steps
          text: "Number each action item as a numbered list instead of bullets."
    - type: Length
      color: blue
      options:
        - label: Short (50 words)
          text: "Keep the entire summary under 50 words total."
        - label: Detailed (200 words)
          text: "Expand to a detailed summary up to 200 words, including context for each decision."
    - type: Audience
      color: purple
      options:
        - label: For executives
          text: "Write it for a time-pressed executive who only reads the first line of each section."
        - label: For the whole team
          text: "Write it so every attendee can understand it, including people who joined the call late."

- title: Simplify technical text for a non-technical audience
  category: Work communication
  suitable_llms: [Claude, ChatGPT, Copilot]
  description: |
    Good for translating jargon-heavy docs or specs into something a non-technical stakeholder can actually follow.
  prompt: |
    Rewrite the paragraph below for someone with no technical background. Avoid jargon, use short sentences, and use one analogy to explain the core idea.
  sample_input: |
    "The API uses OAuth 2.0 for authentication, issuing a short-lived access token and a longer-lived refresh token to maintain a secure session without repeated logins."
  sample_output: |
    Think of it like a wristband at a festival. When you log in, the system gives you a temporary wristband (a "token") that proves who you are, so you don't have to show your ID every time you want to enter a stage. A second, longer-lasting wristband lets the system quietly issue you a fresh one before the first expires, so you stay logged in without noticing.
  addons:
    - type: Length
      color: blue
      options:
        - label: 3 sentences
          text: "Keep the explanation to exactly 3 short sentences."
        - label: One paragraph
          text: "Keep it to a single short paragraph, no more than 5 sentences."
    - type: Analogy style
      color: purple
      options:
        - label: Everyday object
          text: "Use an analogy based on a common everyday object or activity."
        - label: No analogy
          text: "Do not use any analogy — just plain simple language."

- title: Write a project status update
  category: Work communication
  suitable_llms: [Claude, ChatGPT, Copilot]
  description: |
    Turn a jumble of project progress into a clear status update your manager or stakeholders can skim in under a minute.
  prompt: |
    Write a project status update for the stakeholders below. Structure it as: Overall status (on track / at risk / delayed), What shipped this week, What's next, and Blockers (if any). Keep it under 150 words.
  sample_input: |
    [ATTACH: project_notes.txt]
    Shipped the new checkout flow to 20% of users, conversion up 3%. Still waiting on legal sign-off for the refund policy wording — blocking full rollout. Next week: fix the mobile layout bug reported by QA, and start on the loyalty points feature.
  sample_output: |
    **Status:** On track

    **Shipped this week:** New checkout flow live for 20% of users (conversion up 3%).

    **Next:** Fix the mobile layout bug from QA, begin loyalty points feature.

    **Blockers:** Waiting on legal sign-off for refund policy wording before full rollout.
  addons:
    - type: Tone
      color: blue
      options:
        - label: Casual, team-facing
          text: "Use a casual, team-facing tone, like a Slack update."
        - label: Formal, exec-facing
          text: "Use a formal tone suitable for a leadership audience."
    - type: Format
      color: green
      options:
        - label: Bullet list
          text: "Format as a bullet list under each heading."
        - label: Traffic-light table
          text: "Format as a table with a Red/Amber/Green status column."
    - type: Length
      color: orange
      options:
        - label: Very short (50 words)
          text: "Keep it under 50 words, headline only."
        - label: Detailed (250 words)
          text: "Expand to a detailed update up to 250 words, including context for each blocker."

# ---------------- PROFESSIONAL: Data & analysis ----------------

- title: Extract action items from messy notes
  category: Data & analysis
  suitable_llms: [Any]
  description: |
    Turns scribbled, unstructured notes into a clean, consistent bullet list — handy right after a stand-up or a brainstorm.
  prompt: |
    Extract every action item from the notes below as a bullet list. For each one include: task, owner (if mentioned), and deadline (if mentioned). If any field is missing, write "not specified".
  sample_input: |
    [ATTACH: raw_notes.txt]
    ok so priya said she'll send the deck by wed. marcus still needs to book the venue, no date given tho. also someone needs to email the vendors asap - daniel volunteered.
  sample_output: |
    - **Task:** Send the deck | **Owner:** Priya | **Deadline:** Wednesday
    - **Task:** Book the venue | **Owner:** Marcus | **Deadline:** not specified
    - **Task:** Email the vendors | **Owner:** Daniel | **Deadline:** ASAP
  addons:
    - type: Format
      color: green
      options:
        - label: Table
          text: "Output as a markdown table with columns: Task, Owner, Deadline."
    - type: Missing-field handling
      color: orange
      options:
        - label: Skip incomplete items
          text: "If owner AND deadline are both missing, omit that item entirely instead of writing \"not specified\"."

- title: Compare two options in a table
  category: Data & analysis
  suitable_llms: [Any]
  description: |
    Useful whenever you're weighing build-vs-buy or any other two-option decision and want the trade-offs laid out plainly.
  prompt: |
    Compare the two options below in a markdown table with these columns: Option, Cost, Time to implement, Main risk. Then add one sentence recommending which to choose and why.
  sample_input: |
    Option A: Build an in-house tool (est. 3 months, 2 engineers)
    Option B: Buy an existing SaaS subscription (est. $500/month)
  sample_output: |
    | Option | Cost | Time to implement | Main risk |
    |---|---|---|---|
    | A: Build in-house | 2 engineers x 3 months | ~3 months | Scope creep, maintenance burden |
    | B: Buy SaaS | ~$500/month | Days | Vendor lock-in |

    **Recommendation:** Buy the SaaS option first to validate the need before investing engineering time in a custom build.
  addons:
    - type: Extra column
      color: green
      options:
        - label: Add "Best for"
          text: "Add a 4th column called 'Best for' describing the ideal use case for each option."
        - label: Add scoring
          text: "Add a 1-5 score for each option in each row, then total the scores at the bottom."
    - type: Recommendation style
      color: pink
      options:
        - label: One sentence
          text: "Keep the recommendation to one sentence."
        - label: With reasoning
          text: "Give a two-to-three sentence recommendation that explains the trade-off you weighed most heavily."
    - type: Visualization
      color: blue
      options:
        - label: Add a bar chart
          text: "Also generate a bar chart comparing the cost of each option, as an artifact if your tool supports it."
        - label: Add a radar chart
          text: "Also generate a radar chart comparing cost, time to implement, and risk across both options, as an artifact if your tool supports it."

- title: Turn raw numbers into a plain-English insight
  category: Data & analysis
  suitable_llms: [Claude, ChatGPT]
  description: |
    Good for translating a small dataset or set of metrics into a takeaway a non-analyst can act on.
  prompt: |
    Look at the data below and write a 3-sentence summary of the single most important trend, plus one recommended action based on it. Avoid jargon.
  sample_input: |
    Monthly signups: Jan 120, Feb 135, Mar 110, Apr 95, May 80
    Monthly churn: Jan 5%, Feb 6%, Mar 9%, Apr 12%, May 15%
  sample_output: |
    Signups have declined 33% since February while churn has tripled over the same period — the business is now losing customers faster than it's gaining them. This points to a retention problem, not just an acquisition slowdown. **Recommendation:** pause new-signup spend and investigate why churn is accelerating before scaling acquisition further.
  addons:
    - type: Depth
      color: blue
      options:
        - label: One sentence only
          text: "Cut it down to a single sentence, no recommendation."
        - label: Full breakdown
          text: "Add a breakdown of what might be causing the trend, with 2-3 possible explanations."
    - type: Audience
      color: purple
      options:
        - label: For a non-technical exec
          text: "Write for a non-technical executive who has never seen this data before."
        - label: For a fellow analyst
          text: "Write for a fellow analyst — you can use statistical terms like 'month-over-month' freely."
    - type: Visualization
      color: green
      options:
        - label: Add a line chart
          text: "Also generate a line chart plotting signups and churn over the 5 months, as an artifact if your tool supports it."
        - label: Add a bar chart
          text: "Also generate a bar chart comparing signups and churn side by side for each month, as an artifact if your tool supports it."

# ---------------- PROFESSIONAL: Career & job search ----------------

- title: Turn a work history into resume bullet points
  category: Career & job search
  suitable_llms: [Claude, ChatGPT, Copilot]
  description: |
    Turns a rough description of what you did in a role into punchy, results-focused resume bullets.
  prompt: |
    Turn the description below into 3 resume bullet points. Start each with a strong action verb, quantify the impact wherever possible, and keep each bullet to one line.
  sample_input: |
    I ran the social media accounts for a small bakery. Grew the Instagram following, ran some promotions around holidays that did well, and started replying to reviews which seemed to help repeat customers.
  sample_output: |
    - Grew Instagram following through consistent content and holiday-themed promotional campaigns
    - Increased repeat customer engagement by proactively responding to online reviews
    - Managed end-to-end social media strategy for a small business with measurable follower growth
  addons:
    - type: Quantify
      color: blue
      options:
        - label: Add placeholder numbers
          text: "Add placeholder metrics in brackets, like [X]%, so I can fill in the real numbers later."
        - label: Keep it qualitative
          text: "Don't invent any numbers — keep it qualitative only."
    - type: Target role
      color: purple
      options:
        - label: Marketing role
          text: "Tailor the language toward a marketing coordinator job application."
        - label: Social media manager role
          text: "Tailor the language toward a dedicated social media manager job application."

- title: Draft a cover letter opening paragraph
  category: Career & job search
  suitable_llms: [Claude, ChatGPT]
  description: |
    Gets past the blank-page problem for the hardest part of a cover letter — the opening hook.
  prompt: |
    Write a 3-sentence cover letter opening paragraph for the job and background below. Make it specific to the role, not generic, and avoid clichés like "I am excited to apply".
  sample_input: |
    Job: Junior Data Analyst at a healthcare startup.
    My background: Recent statistics graduate, did a university project analyzing hospital wait-time data, no full-time work experience yet.
  sample_output: |
    During my statistics degree, I spent a semester analyzing hospital wait-time data — and found that a scheduling change I proposed could have cut average wait times by 15%. That project convinced me healthcare is where I want to apply data skills for real. As a recent graduate looking for my first analyst role, [Company]'s mission to make care more efficient is exactly the kind of problem I want to work on.
  addons:
    - type: Tone
      color: blue
      options:
        - label: Confident
          text: "Make the tone confident and direct."
        - label: Warm and personable
          text: "Make the tone warm and personable, like you're talking to a future colleague."
    - type: Length
      color: green
      options:
        - label: 2 sentences
          text: "Cut it down to exactly 2 sentences."
        - label: 5 sentences
          text: "Expand it to 5 sentences with one more concrete detail."

- title: Prep answers for a common interview question
  category: Career & job search
  suitable_llms: [Claude, ChatGPT, Copilot]
  description: |
    Turns a messy real story into a structured STAR-method answer you can actually say out loud in an interview.
  prompt: |
    Using the STAR method (Situation, Task, Action, Result), turn the story below into a structured interview answer for the question: "Tell me about a time you dealt with conflict." Keep the whole answer under 45 seconds if spoken aloud.
  sample_input: |
    Two people on my team disagreed about which vendor to use for a project. It got kind of tense in a meeting. I suggested we each list pros/cons and score them against our actual requirements instead of just opinions. We ended up picking a third option neither had originally proposed and the project went well.
  sample_output: |
    **Situation:** Two teammates strongly disagreed over which vendor to choose for a project, and it started to create tension in meetings.

    **Task:** As the project lead, I needed to resolve the disagreement without alienating either person.

    **Action:** I proposed we score each vendor against our actual project requirements instead of debating opinions, and had both teammates contribute to the criteria.

    **Result:** The scoring surfaced a third vendor neither had originally proposed — we chose it, and the project shipped successfully with both teammates on board.
  addons:
    - type: Length
      color: blue
      options:
        - label: Even shorter (20 seconds)
          text: "Trim it down to a 20-second version, hitting only the key points."
        - label: More detail
          text: "Add one more sentence of detail to the Action step."
    - type: Question type
      color: purple
      options:
        - label: Leadership question
          text: "Adapt this for the question 'Tell me about a time you showed leadership' instead."
        - label: Failure question
          text: "Adapt this for the question 'Tell me about a time you failed' instead."

