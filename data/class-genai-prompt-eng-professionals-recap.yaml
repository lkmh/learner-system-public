class: GenAI and Prompt Engineering for Professionals
class_id: genai-prompt-eng-professionals
sections:
- section: LLM101
  topics:
  - module: concepts
    id: statistics
    topic: 'T1: LLMs are statistics machines'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: What is an LLM actually doing when it generates a reply?
        options:
        - It looks up the answer in a database of facts.
        - It predicts the next word based on patterns it learned from huge amounts of training text.
        - It checks a live, up-to-date source to find the correct answer.
        - It reasons through the logic of the question step by step before answering.
        answer: 1
        explanation: LLMs predict text one word at a time based on patterns in their training data — they
          don't look answers up in a database or check a live source.
        written_prompt: Explain, in your own words, what an LLM is actually doing when it generates the
          next word of a response.
      - question: 'Two ways of describing how an LLM writes text are compared: Way A says it follows a
          fixed set of hand-written grammar rules. Way B says it predicts the next word based on patterns
          learned from massive amounts of training text. Which one actually describes a modern LLM?'
        options:
        - Way A — LLMs assemble text using hand-written grammar rules.
        - Way B — LLMs generate text by predicting the next word based on patterns learned during training.
        - Both — LLMs use hand-written rules first, then double-check with patterns.
        - Neither — LLMs retrieve pre-written sentences from a database.
        answer: 1
        explanation: LLMs predict the next word from patterns learned in training — they aren't following
          hand-written grammar rules.
        written_prompt: Explain why Way B, not Way A, describes how a modern LLM actually generates text.
      - question: As an LLM is trained on more and more text, what's the most direct effect on the quality
          of what it writes?
        options:
        - Its writing tends to get more fluent and coherent, since it's seen far more examples of real
          language to learn from.
        - It starts double-checking its answers against a fact database.
        - The cost of each request automatically goes down.
        - It stops predicting words and switches to following fixed rules instead.
        answer: 0
        explanation: The more real text a model is trained on, the more patterns it has to draw on — that
          alone tends to make its output more fluent and coherent.
        written_prompt: Explain why more training data tends to improve an LLM's fluency, based on how
          it learns.
      - question: 'Someone claims: "LLMs work by looking up the correct answer in a giant table built
          during training." What''s wrong with that claim?'
        options:
        - Nothing — the claim is accurate.
        - There's no literal lookup table — an LLM predicts each word from patterns spread across everything
          it learned in training, not by retrieving a stored answer.
        - LLMs do use a lookup table, but only for grammar, never for facts.
        - The claim only applies to older, smaller language models.
        answer: 1
        explanation: An LLM isn't retrieving a stored answer from a table — it's predicting each word
          from patterns learned across all of its training.
        written_prompt: Explain what's wrong with describing an LLM as a 'giant lookup table.'
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: An LLM learns to write by reading huge amounts of text and practicing guessing what
          word comes next. Based on that, if you prompt it with "peanut butter and", which word is it
          most likely to predict next?
        options:
        - bread
        - jelly
        - sandwich
        - butter
        answer: 1
        explanation: '"Peanut butter and jelly" is an overwhelmingly common phrase in English text, making
          "jelly" the statistically dominant next-token completion.'
        written_prompt: Given the phrase "peanut butter and ___", explain which word an LLM would most
          likely predict next and why, in terms of statistical patterns in training text.
      - question: 'Complete the phrase using the model''s most likely next-token prediction: "Once upon
          a ___"'
        options:
        - time
        - day
        - story
        - land
        answer: 0
        explanation: '"Once upon a time" is an overwhelmingly common opening phrase in English text, making
          "time" the statistically dominant next-token completion.'
        written_prompt: Explain which word an LLM would most likely predict to complete "Once upon a ___"
          and why.
      - question: 'Complete the phrase using the model''s most likely next-token prediction: "Thank you
          very ___"'
        options:
        - much
        - kindly
        - nice
        - welcome
        answer: 0
        explanation: '"Thank you very much" is a far more statistically common completion in English text
          than the other options.'
        written_prompt: Explain which word an LLM would most likely predict to complete "Thank you very
          ___" and why.
      - question: 'Complete the phrase using the model''s most likely next-token prediction: "The quick
          brown fox jumps over the lazy ___"'
        options:
        - dog
        - cat
        - fence
        - log
        answer: 0
        explanation: This is a famous pangram sentence that appears extremely frequently in training text,
          making "dog" an overwhelmingly likely completion.
        written_prompt: Explain why "dog" is the statistically likely completion of this well-known pangram
          sentence.
  - module: concepts
    id: stateless
    topic: 'T2: LLMs are stateless — they forget everything'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: Why does an app have to resend the whole conversation history every time it asks the
          model a new question?
        options:
        - Because the app's settings get completely cleared out every 60 seconds.
        - Because the model itself is stateless and holds no memory of past requests — it only knows what's
          included in the current one.
        - Because past answers get encrypted and become unreadable after the first request.
        - Because resending the history is what updates and improves the model over time.
        answer: 1
        explanation: The model itself is stateless — it has no memory between calls, so the full conversation
          has to be resent every time to preserve context.
        written_prompt: Explain why an application must resend the entire conversation history with every
          new request to a stateless LLM API.
      - question: Partway through a conversation, an app sends the model only the user's newest message,
          with none of the earlier turns. The model responds as if it has no idea what was discussed earlier.
          What does this show?
        options:
        - The model itself retains no memory of anything not included in the current request — it only
          "knows" what's actually sent to it.
        - The model deliberately forgets messages older than 60 seconds.
        - The app automatically deletes old messages after they're first read.
        - The model needs a special "memory mode" turned on to recall history.
        answer: 0
        explanation: 'This is the core stateless property: the model has no memory between requests, so
          it only ever "knows" what''s actually included in the current request.'
        written_prompt: Explain what this scenario demonstrates about where an LLM's apparent memory actually
          lives.
      - question: Assuming an app resends conversation history correctly, what actually changes about
          the model itself between turn 1 and turn 5 of a conversation?
        options:
        - Nothing about the model changes — only what gets sent to it grows to include more of the earlier
          turns; every call is still a fresh, stateless one.
        - The model quietly updates itself turn to turn to remember the user.
        - The model remembers the user's identity on its own, across calls.
        - Only the app's instructions change between turns, never the conversation history.
        answer: 0
        explanation: The model itself doesn't change or accumulate memory — only what's sent to it (a
          growing conversation history) changes, since every call is a fresh, stateless request.
        written_prompt: Explain what actually changes, and what stays the same, between turn 1 and turn
          5 of a correctly-implemented conversation.
      - question: 'Two explanations are offered for why a chatbot "remembers" earlier parts of a conversation:
          Explanation A says the model has an internal short-term memory buffer that persists across calls.
          Explanation B says the app resends the entire prior conversation as part of each new request.
          Which is accurate?'
        options:
        - Explanation A
        - Explanation B — the app quietly resends the growing transcript with every new request; the model
          itself has no persistent memory buffer.
        - Both are equally accurate.
        - Neither; conversation memory works some other way.
        answer: 1
        explanation: LLMs are stateless — any apparent memory comes entirely from the app resending the
          conversation history, not from an internal buffer inside the model.
        written_prompt: Explain why Explanation B, not Explanation A, correctly describes how conversational
          memory works.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'A support bot logs show this exchange:

          User: "My order #4471 hasn''t arrived."

          Assistant: "I''m sorry to hear that — let me check order #4471 for you. It shipped on the 3rd."

          User: "Can you cancel it instead?"

          Assistant: "I don''t have any order number to look up — could you provide one?"

          What actually went wrong?

          '
        options:
        - 'The app''s second request to the model didn''t include the earlier turns mentioning order #4471,
          so the model has no record of it.'
        - The model forgot the order number because too much time passed between messages.
        - 'Order #4471 was deleted from the database between the two messages.'
        - The model intentionally hides order numbers for privacy reasons.
        answer: 0
        explanation: This is a textbook resend failure — the app dropped the earlier turns before the
          third request, so the model genuinely has nothing to refer to. Time passing and privacy filtering
          aren't how stateless memory loss works.
        written_prompt: 'Diagnose the support-bot transcript: why does the assistant suddenly lose track
          of the order number, and what specifically would fix it?'
      - question: 'Two engineers debug the same symptom (a model losing earlier context) and propose different
          fixes:

          Engineer A: "Switch to a larger, more capable model — it''ll remember better."

          Engineer B: "Check whether the full conversation history is being resent with each API call."

          Who is diagnosing this correctly?

          '
        options:
        - Engineer A — bigger models have larger internal memories.
        - Engineer B — the fix for lost context is almost always in what the app resends, not the model's
          capability.
        - Both are equally likely to fix it.
        - Neither — the fix requires fine-tuning the model on the conversation.
        answer: 1
        explanation: Model size has nothing to do with this — a stateless model, however large, only knows
          what's in the current request. Engineer B is checking the actual mechanism that carries memory
          across turns.
        written_prompt: Explain why swapping to a bigger model would not fix a lost-context bug, using
          what you know about how LLMs handle conversation memory.
      - question: 'For turn 3 of a conversation, the app sends the model only the user''s newest message
          —

          "Can you cancel it instead?" — with none of the earlier messages included.

          What will the model most likely do with "it"?

          '
        options:
        - Correctly figure out which order is meant, from its own long-term memory of the account.
        - Fail to figure out what "it" refers to, since none of the earlier messages were included.
        - Automatically fetch the full conversation from the app's records on its own.
        - Ask the user to log in again to restore its memory.
        answer: 1
        explanation: Whatever isn't included in the request doesn't exist for the model. With no earlier
          messages included, "it" is unresolvable — this is the same resend failure, just viewed from
          the message actually sent.
        written_prompt: Given only that single message, explain exactly what information the model does
          and doesn't have access to, and why.
      - question: 'Which fix correctly addresses a stateless-memory bug where the assistant forgets something
          mentioned two turns earlier?

          '
        options:
        - Increase the model's temperature setting.
        - Make sure the app includes all earlier turns (or a summary of them) in every new message it
          sends to the model.
        - Ask the user to repeat their entire message history in one block.
        - Give the model a longer knowledge cutoff.
        answer: 1
        explanation: 'The only real fix is on the app''s side: it has to carry the conversation forward
          itself, either as full history or a condensed summary. Temperature and knowledge cutoff are
          unrelated settings, and asking the user to manually replay history defeats the point of the
          app managing state.'
        written_prompt: Propose the correct engineering fix for a chat app where the assistant keeps forgetting
          details from a few turns earlier, and explain why it works.
  - module: concepts
    id: instructions
    topic: 'T3: Every conversation has layers of instructions'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: Before a model reads them, how do platform rules, the app's system prompt, custom instructions,
          and the user's message actually get combined?
        options:
        - They're kept in separate, walled-off sections the model reads one at a time.
        - They're handled one after another by separate mini-models, each responsible for one layer.
        - They're merged into one single, continuous piece of text, with hidden labels marking who "said"
          each part.
        - They're sent to separate lookup systems that each calculate their own answer.
        answer: 2
        explanation: There's no physical separation — all the layers and the user's message become one
          continuous piece of text, distinguished only by hidden labels.
        written_prompt: Explain how platform rules, system prompts, custom instructions, and the user's
          message actually get combined before a model reads them.
      - question: When a platform-wide rule and the app's own system prompt point in different directions,
          which one wins?
        options:
        - The platform-wide rule — it's a hierarchy, and the platform rule outranks the app's own system
          prompt no matter how specific the system prompt is.
        - Whichever one is more specific to the situation, regardless of which layer it's in.
        - Whichever one was written most recently.
        - The model picks randomly between conflicting instructions.
        answer: 0
        explanation: Instruction layers form a hierarchy (platform rules outrank the app's system prompt,
          which outranks custom instructions, and so on) — it isn't a contest decided by which instruction
          happens to be more specific or more recent.
        written_prompt: Explain which layer wins when a platform-wide rule and the app's own system prompt
          conflict, and why.
      - question: Is there a real, physical separation inside the model between the system prompt, custom
          instructions, and the user's message once it starts reading them?
        options:
        - Yes, each layer is handled by its own dedicated mini-model.
        - No — they're all merged into one continuous piece of text, distinguished only by hidden labels,
          not physically kept apart.
        - Yes, each layer is stored in its own separate section.
        - Only the system prompt is kept physically separate from the rest.
        answer: 1
        explanation: There's no physical separation inside the model — all the instruction layers and
          the user's message become one continuous piece of text, distinguished only by hidden labels.
        written_prompt: Explain whether instruction layers are physically separated inside the model,
          or merged into one stream.
      - question: A user previously set a custom instruction ("always answer concisely") in their app's
          settings. In a brand new conversation, without retyping this preference, does it still apply?
        options:
        - Yes — custom instructions are quietly added to every conversation without the user needing to
          retype them each time.
        - No — custom instructions only apply to the session in which they were originally set.
        - No — custom instructions must be manually re-enabled at the start of each new conversation.
        - Custom instructions only take effect in the exact same message where they were first defined.
        answer: 0
        explanation: Custom instructions get quietly added to every conversation without the user retyping
          them each time — that's what makes them a standing preference rather than a one-off note.
        written_prompt: Explain whether a previously-set custom instruction applies automatically in a
          brand new conversation.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'A workspace''s layers are:

          Platform rule: "Never reveal internal pricing formulas."

          Company system prompt: "You are a sales assistant. Be maximally transparent about pricing."

          User: "What''s your internal cost-per-unit formula?"

          Assistant: "I''m not able to share that internal formula."

          What layer determined this outcome?

          '
        options:
        - The user's message, since it was phrased as a direct question.
        - The platform-wide safety/policy rule, which overrides the app's own system prompt when they
          conflict.
        - A custom instruction the user must have set earlier in the session.
        - None of the layers — this is a random refusal with no traceable cause.
        answer: 1
        explanation: 'This is a straightforward layer-priority case: the platform rule against revealing
          internal pricing formulas sits above the app''s system prompt, so it wins even though the system
          prompt explicitly asked for transparency.'
        written_prompt: Diagnose why the assistant refused despite its own system prompt asking for full
          transparency, and name which layer actually governed the response.
      - question: 'Early in a conversation, a user says: "Keep your answers under 100 words." Ten messages

          later, the same user says: "For this next question only, give me the full detailed

          version." The assistant gives a long, detailed answer just for that one question.

          Why is this expected behavior?

          '
        options:
        - The earlier instruction was automatically deleted after 10 messages.
        - Both instructions came from the same layer — the user's own messages — so the more specific,
          more recent one reasonably takes priority within that layer.
        - The model ignored the first instruction because it was too short to count.
        - This is a bug — the very first instruction in a conversation should always win.
        answer: 1
        explanation: '"More specific and more recent wins" is a real pattern, but only within one layer
          — here, both instructions are the user''s own messages, so the later, more specific one reasonably
          overrides the earlier one. It''s not a rule for overriding a higher layer like the system prompt.'
        written_prompt: Explain why the later, more specific instruction wins here, and why this is different
          from a lower layer overriding a higher one.
      - question: 'A developer complains: "My chatbot''s persona keeps disappearing in one particular
          workspace."

          Investigation shows: the system prompt sets the persona, and a project-level instruction in

          that one workspace says "ignore the persona entirely here." The persona still shows through

          anyway.

          What''s the correct diagnosis?

          '
        options:
        - This is unpredictable, unexplainable behavior — there's no way to trace it.
        - 'This is expected: the system prompt sits above project-level instructions in the hierarchy,
          so it wins when they conflict — the project-level instruction isn''t able to override it.'
        - The system prompt must contain a typo that's randomly triggering.
        - The model has a fault causing intermittent persona loss.
        answer: 1
        explanation: This isn't random — it's the hierarchy working as designed. The system prompt outranks
          a project-level instruction, so the persona coming through even when a project-level instruction
          tries to suppress it is expected, not a bug.
        written_prompt: Explain to the developer why the persona still shows through, identifying which
          layer is actually winning and why.
      - question: 'A request to the model is built from a platform rule, a system prompt, a custom instruction,

          and the user''s message. A developer asks: "Can I find a specific spot inside the model

          where the platform rule is being kept separate from the user''s message?"

          '
        options:
        - Yes — each layer is kept in its own separate, inspectable section inside the model.
        - No — all the layers are merged into one continuous piece of text (with hidden labels) before
          the model reads any of it; there's no separate spot to look for.
        - Yes, but only for the largest model in a given family.
        - No, because the platform rule never actually reaches the model at all.
        answer: 1
        explanation: '"Layers" is a mental model for us, not a real boundary inside the model — everything
          becomes one continuous piece of text distinguished only by hidden labels, so there''s no separate
          spot to inspect.'
        written_prompt: Explain why a developer can't find a separate spot inside the model for the platform
          rule versus the user's message, referring to how these layers actually get merged.
  - module: concepts
    id: tokens
    topic: 'T7: Text is broken into tokens, not words'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: What is the fundamental unit of text that language models actually process?
        options:
        - Individual letters, processed one character at a time.
        - Whole words only, with each unique word mapped to one unit.
        - Tokens — chunks of text that can be a whole word, part of a word, or punctuation, depending
          on how common that chunk is.
        - Full sentences, split at each period or equivalent punctuation mark.
        answer: 2
        explanation: Models read tokens, not letters or whole words — a token can be a full word, a word
          fragment, or punctuation, depending on frequency in training data.
        written_prompt: Explain what a 'token' is and how it differs from a word or a letter.
      - question: Why do rare words, non-English languages, code, and math typically cost more and reason
          less well in an LLM than common English text?
        options:
        - Providers deliberately price non-English content higher as a business policy unrelated to tokenization.
        - They get chopped into many more, smaller tokens than common English text of similar length,
          since the 1,000-tokens-≈-750-words ratio only holds for common English.
        - Models refuse to process any text that isn't standard English by default.
        - Non-English and code inputs are always rejected outright by the tokenizer before reaching the
          model.
        answer: 1
        explanation: The token-to-word ratio assumes common English; rarer vocabulary, other languages,
          code, and math all fragment into more, smaller tokens, raising both cost and reasoning difficulty.
        written_prompt: Explain why code, math, and non-English text tend to use up more tokens than an
          equivalent amount of everyday English text.
      - question: Why are model pricing, usage limits, and context windows almost always quoted in tokens
          rather than words or characters?
        options:
        - Because tokens are the model's actual unit of text processing, making them the natural measure
          for cost and capacity.
        - Because word counts are considered a trade secret that providers are legally barred from disclosing.
        - Because character counts are too small a number to be practically useful for billing purposes.
        - Because tokens are a marketing term with no real technical basis in how models work.
        answer: 0
        explanation: Since tokens are literally what the model reads and generates, they're the natural,
          precise unit for measuring usage, cost, and capacity.
        written_prompt: Explain why pricing and context limits are quoted in tokens instead of words or
          characters.
      - question: According to the commonly used rule of thumb, roughly how many words does 1,000 tokens
          correspond to in common English text?
        options:
        - About 250 words.
        - About 500 words.
        - About 750 words.
        - About 1,500 words.
        answer: 2
        explanation: The standard rule of thumb is that 1,000 tokens is roughly 750 words of common English,
          since each token averages a bit under one full word (about 4 characters).
        written_prompt: State the rule-of-thumb ratio between tokens and words in common English text.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'Two prompts of similar character length are compared for token cost:

          Prompt A: "Please summarize the meeting notes below in three bullet points."

          Prompt B: "class Foo{constructor(x,y){this.x=x;this.y=y;}bar(){return this.x*this.y;}}"

          Which will very likely use more tokens per character, and why?

          '
        options:
        - Prompt A, because English sentences always require more tokens than any code snippet.
        - Prompt B, because dense code punctuation, brackets, and unusual character sequences get split
          into many small tokens, unlike common English words which often map to single tokens.
        - They will use exactly the same number of tokens, since both are the same length in characters.
        - Neither uses tokens; code is measured only in characters, never tokens.
        answer: 1
        explanation: Common English words are frequent enough to often be single tokens, while dense code
          syntax (braces, semicolons, short unusual identifiers) fragments into many more, smaller tokens
          per character — this is exactly the code-costs-more pattern from the lesson.
        written_prompt: Explain why the code snippet is likely to cost more tokens per character than
          the English sentence, even though both are similar lengths.
      - question: 'A team budgets their support-bot context window assuming ''1,000 tokens ≈ 750 words''
          across all their content, including a large volume of Japanese-language tickets.

          Their actual token usage on Japanese tickets is running far higher than the estimate. What''s
          the likely explanation?

          '
        options:
        - The rule of thumb only holds for common English text — non-English languages like Japanese typically
          get chopped into many more, smaller tokens per equivalent amount of text, so the estimate underscores
          actual usage.
        - This must be a billing error on the provider's part, unrelated to tokenization.
        - Japanese tickets are simply longer in word count than English tickets on average, for unrelated
          reasons.
        - The 750-word rule applies equally to all languages, so this is unexplainable.
        answer: 0
        explanation: The 1,000-tokens-≈-750-words estimate is explicitly an English-only rule of thumb;
          non-English text (like Japanese) tokenizes less efficiently, consuming more tokens for an equivalent
          amount of meaning — exactly what's causing the budget to run over.
        written_prompt: Diagnose why the Japanese-ticket token usage is exceeding the team's English-based
          budget estimate, and what it implies for planning.
      - question: 'A developer wants to reduce API costs and proposes: "Let''s just count characters instead
          of tokens for our budgeting — it''s simpler and should track cost just as well."

          Why is this likely to produce inaccurate budgets?

          '
        options:
        - Because token count depends on how the specific text happens to chunk given the tokenizer's
          vocabulary, not on character count directly — equal character counts can produce very different
          token counts depending on content type (English prose vs. code vs. rare words).
        - Because character counting is technically impossible for any programming language to implement.
        - Because tokens and characters are always a fixed 1:1 ratio, so there's no difference either
          way.
        - Because providers never disclose token counts, only character counts, making tokens irrelevant
          to budgeting.
        answer: 0
        explanation: Token count is a function of how content chunks under the tokenizer's vocabulary,
          which varies by content type — the same character count can map to very different token counts,
          so character-based budgeting will systematically mis-predict cost for content mixes that include
          code, rare words, or non-English text.
        written_prompt: Explain to the developer why character count is an unreliable stand-in for token
          count when estimating API cost.
      - question: 'A user pastes a chemistry equation-heavy document into a chatbot and is surprised the
          response used up their token quota much faster than a plain-English document of the same word
          count.

          What''s the best diagnosis?

          '
        options:
        - The chatbot is malfunctioning and double-charging for equation-heavy content.
        - Mathematical notation typically fragments into many more, smaller tokens than common English
          prose of the same length, consistent with the lesson's point that math and rare symbol sequences
          cost more tokens.
        - Word count and token count are always identical regardless of content, so this must be unrelated
          to tokenization.
        - This only happens if the chatbot's temperature setting is too high.
        answer: 1
        explanation: 'This matches the lesson''s point directly: math notation, like code and rare vocabulary,
          chops into many more, smaller tokens than equivalent-length common English prose — it''s not
          a billing bug or a temperature issue, it''s expected tokenization behavior for that content
          type.'
        written_prompt: Explain to the user why their equation-heavy document consumed more of their token
          quota than a plain-English document of similar word count.
  - module: concepts
    id: context-window
    topic: 'T8: Context windows have a limited attention span'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: What happens once a conversation's total resent history exceeds a model's context window
          limit?
        options:
        - The model automatically summarizes the entire conversation and continues without any data loss.
        - The oldest messages start getting silently dropped by the surrounding app to make room for new
          ones — they stay visible in the chat window, but the model no longer reads them.
        - The request is rejected outright and no further messages can ever be sent in that conversation.
        - The model expands its context window automatically to accommodate the extra tokens.
        answer: 1
        explanation: The app (not the raw model) handles overflow by dropping or summarizing the oldest
          messages — they remain visible on screen but the model no longer actually reads them; the raw
          model itself just errors if handed more tokens than its limit.
        written_prompt: Explain what actually happens once a conversation grows past a model's context
          window limit.
      - question: Why does the 'lost in the middle' effect matter even for a conversation that's well
          within the context window limit?
        options:
        - Because it doesn't matter at all — performance is uniform across the whole context as long as
          you're under the limit.
        - Because models are measurably worse at using facts buried in the middle of a long context than
          facts near the start or end, so a longer-but-still-within-limit context isn't a free lunch.
        - Because being under the limit always guarantees perfect recall of every fact in the context.
        - Because the middle of a context window is reserved exclusively for system prompts and never
          contains user content.
        answer: 1
        explanation: Recall degrades for information placed in the middle of a long context, independent
          of whether the total token count exceeds the hard cap — so extra context has a real, gradual
          cost even before truncation kicks in.
        written_prompt: Explain why the position of information within a long-but-not-overflowing context
          can still affect how well a model uses it.
      - question: Why does resending the full conversation each turn cause the token cost of a long conversation
          to compound?
        options:
        - Because turn 10 has to resend turns 1 through 9 as well, so history grows with every additional
          turn, not just the newest message.
        - Because providers apply an artificial multiplier fee for every turn past the fifth in a conversation.
        - Because models require duplicate copies of each message to be sent for verification purposes.
        - Because token costs actually decrease as conversations get longer, due to caching discounts.
        answer: 0
        explanation: Since the whole transcript is resent every turn, later turns carry the accumulated
          cost of every earlier turn too — the history compounds rather than staying flat.
        written_prompt: Explain why the token cost of a long conversation compounds over time, referring
          to what gets resent each turn.
      - question: Why is editing an earlier message in a conversation often preferable to just adding
          a new corrective message on top?
        options:
        - Editing is technically impossible, so this is a trick question — only adding new messages is
          supported.
        - Piling on new corrective messages compounds a longer, sometimes contradictory history and eats
          into the context budget faster, whereas editing keeps the conversation focused without dragging
          along the confusing back-and-forth.
        - Adding new messages is always free, while editing an earlier message costs extra tokens.
        - Editing automatically increases the model's context window size for that conversation.
        answer: 1
        explanation: Editing avoids stacking a longer, contradictory history — it keeps the conversation
          lean and focused rather than accumulating extra correction turns that all still get resent every
          time.
        written_prompt: Explain why editing an earlier message is often better than adding a new message
          to correct something.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'A 200-turn conversation is well under the model''s stated context window (logs confirm
          total tokens used is far below the cap). The user asks about a detail from turn 5, and the assistant
          answers incorrectly, blending in unrelated later details.

          What''s the most likely diagnosis?

          '
        options:
        - The context window must have been silently exceeded despite what the logs say.
        - This is the 'lost in the middle' effect — the turn-5 detail is technically still present in
          context but is being recalled less reliably because of its position deep in a long conversation,
          well before truncation would even be a factor.
        - The assistant is fabricating information unrelated to context length at all.
        - The user must have misremembered what was said in turn 5.
        answer: 1
        explanation: 'The logs rule out hard truncation (well under the cap), which points to the ''lost
          in the middle'' effect: recall degrades for information away from the start/end of a long context,
          even without hitting the hard limit.'
        written_prompt: Diagnose why the assistant recalls a mid-conversation detail poorly even though
          the conversation is confirmed to be under the context window limit.
      - question: 'A long-running chat abruptly stops referencing a detail from turn 2, and the app''s
          logs show the total resent history has just crossed the model''s stated context window limit
          for the first time.

          What''s the most likely explanation?

          '
        options:
        - This is the 'lost in the middle' effect, unrelated to the limit being crossed.
        - The oldest messages, including turn 2, were silently dropped by the app to make room for newer
          ones once the cap was hit — they may still show in the chat window, but the model no longer
          reads them.
        - The model refuses to continue any conversation once it crosses the context window limit.
        - Crossing the context window limit doubles the model's recall accuracy for older turns.
        answer: 1
        explanation: 'This matches hard-limit truncation, not lost-in-the-middle: once the cap is crossed,
          the app drops the oldest turns to make room, and those turns (like turn 2) are then genuinely
          absent from what the model reads, even though the chat UI may still display them.'
        written_prompt: Explain what's actually happened to turn 2's content once the conversation crosses
          the model's context window limit.
      - question: 'A user corrects an assistant''s earlier mistake by sending five new follow-up messages,
          each adding a clarification on top of the original wrong answer, rather than editing the original
          message.

          What''s the predictable downside of this approach compared to editing the original message?

          '
        options:
        - There is no downside; adding new messages and editing are functionally identical in every way.
        - The five extra messages compound a longer, more tangled history (including the now-contradicted
          original), eating further into the context budget and making the actual intent harder to isolate
          than a clean edit would.
        - Editing an earlier message is technically not possible in any chat interface.
        - Adding new messages actually reduces total token usage compared to editing.
        answer: 1
        explanation: Piling corrections on top, rather than editing the original message, is exactly the
          pattern the lesson warns compounds history length and contradiction — an edit keeps the conversation
          focused instead of dragging along the confusing back-and-forth.
        written_prompt: Explain the downside of the five-message correction approach versus simply editing
          the original message.
      - question: 'A developer wants to extend effective conversation length without hitting context or
          lost-in-the-middle problems. They propose periodically replacing the full turn-by-turn history
          with a concise running summary of key facts, then continuing from there.

          Does this address the described problems?

          '
        options:
        - No — summaries have no effect on either the hard context limit or the lost-in-the-middle effect.
        - Yes — a concise summary reduces total resent tokens (helping the hard limit) and keeps important
          facts near the 'front' of what's resent rather than buried deep in a sprawling transcript (helping
          mitigate lost-in-the-middle).
        - No, because summaries are always longer than the original transcript.
        - Yes, but only because it increases the model's temperature setting.
        answer: 1
        explanation: Summarizing periodically shrinks the resent token footprint (helping stay under the
          hard cap) and keeps key facts from being buried deep in a long, granular transcript, directly
          addressing both problems described in the lesson.
        written_prompt: Explain how periodically summarizing conversation history helps with both the
          context window cap and the lost-in-the-middle effect.
  - module: concepts
    id: hallucination
    topic: 'T9: Hallucination: confident doesn''t mean correct'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: Why can an LLM state completely fabricated information with total confidence?
        options:
        - It is optimized to produce the next plausible-sounding token, not to check facts against a database,
          so it has no built-in way to distinguish a true fact from a statistically plausible-sounding
          sentence.
        - It deliberately lies whenever it lacks sufficient training data on a topic.
        - It always cross-checks a live fact database first, but that database is frequently out of date.
        - Confidence in phrasing is a random stylistic setting unrelated to whether the content is accurate.
        answer: 0
        explanation: The model's core mechanism is plausibility-based next-token prediction, not fact
          verification — it has no innate mechanism to tell fabricated content apart from true content
          unless grounded by external context or tools.
        written_prompt: Explain why an LLM can produce completely fabricated information while sounding
          just as confident as when it's correct.
      - question: Which statement best characterizes the relationship between an LLM's fluency and its
          factual accuracy?
        options:
        - Fluency and factual accuracy are the same thing — if text reads smoothly, it must be accurate.
        - Fluency (how plausible/well-formed the text sounds) and factual accuracy are two separate properties;
          smooth wording is not evidence of truth.
        - Factual accuracy always improves as fluency decreases, so choppy text is more trustworthy.
        - LLMs cannot generate fluent text at all unless the underlying facts are correct.
        answer: 1
        explanation: Plausible-sounding output and true output are independent — the model's generation
          process optimizes for the former, not the latter.
        written_prompt: Explain why fluent, confident-sounding text from an LLM is not by itself evidence
          that the content is factually accurate.
      - question: What is required to reduce the risk of an LLM hallucinating, according to the material?
        options:
        - Grounding the model with real context or tools, since it has no built-in way to distinguish
          truth from plausible fiction otherwise.
        - Simply asking the model to 'be more careful' in the system prompt, which reliably eliminates
          hallucination.
        - Lowering the temperature to zero, which the material states completely eliminates hallucination.
        - Nothing can reduce hallucination risk; it is entirely unavoidable in all circumstances.
        answer: 0
        explanation: Because the model lacks an intrinsic fact-checking mechanism, grounding it with real
          context or tools (like retrieval) is what actually reduces — not eliminates — hallucination
          risk.
        written_prompt: Explain what kind of intervention actually helps reduce hallucination risk, given
          that the model has no built-in fact-checker.
      - question: Is an LLM 'lying' when it hallucinates a fact?
        options:
        - Yes — it is deliberately deceiving the user on purpose, in the same way a person would lie.
        - No — it isn't lying on purpose; it has no built-in way to distinguish a true fact from a statistically
          plausible-sounding sentence.
        - Yes, but only when temperature is set above zero.
        - The question is meaningless because LLMs never produce false information.
        answer: 1
        explanation: Hallucination isn't intentional deception — the model has no internal sense of 'true
          vs. false,' only 'plausible vs. implausible' text.
        written_prompt: Explain why calling a hallucinated LLM output a 'lie' is a misleading way to describe
          what's actually happening.
- section: Basic Prompting and Frameworks
  topics:
  - module: concepts
    id: prompt-elements
    topic: 'T4: Elements of a prompt'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: What happens if you leave details like tone, format, or length limits out of a prompt?
        options:
        - The AI tool will show an error and refuse to respond.
        - The missing details are simply skipped, and the response is generated without them.
        - The tool automatically picks the missing details at random.
        - The model fills in the gaps with its own guess — which reduces how much control you have over
          the result.
        answer: 3
        explanation: Missing prompt details aren't skipped — the model guesses/improvises them, which
          is why being explicit about the things that matter removes that guesswork.
        written_prompt: Explain what happens to a prompt's tone, format, or constraints if you never specify
          them explicitly.
      - question: Which best describes the six prompt elements (role, task, context, format, constraints,
          examples)?
        options:
        - A checklist of ingredients you can build a prompt from — not separate steps the model works
          through one at a time, but all considered together at once.
        - Six separate steps the model performs one after another.
        - Fields that must be filled in on every single prompt.
        - Terms that only apply to the Prompt Frameworks templates, not prompts in general.
        answer: 0
        explanation: These six elements are a checklist for the person writing the prompt, not separate
          steps the model works through — the model considers the whole prompt together, not one piece
          at a time.
        written_prompt: Explain how the six prompt elements relate to how the model actually processes
          a prompt.
      - question: Is it necessary to include all six prompt elements (role, task, context, format, constraints,
          examples) in every single prompt?
        options:
        - No — a quick, simple question might just need a task, while longer or higher-stakes prompts
          benefit from stacking more elements.
        - Yes, omitting any of the six causes an API error.
        - Yes, all six are always required for the model to generate any response at all.
        - No — only "task" and "format" are ever real elements; the other four are just framework jargon.
        answer: 0
        explanation: You don't need all six every time — a quick question might just be a task, while
          longer or higher-stakes prompts benefit from stacking more of them.
        written_prompt: Explain why a simple prompt might only need one or two of the six elements, while
          a complex one benefits from more.
      - question: How does the Prompt Frameworks library (elsewhere in this app) relate to these six prompt
          elements?
        options:
        - The frameworks are ready-made templates built from this same underlying vocabulary of elements
          — this page teaches the vocabulary itself, not a template.
        - They are entirely unrelated systems with no connection.
        - The six elements replace the need for frameworks entirely.
        - Frameworks are a subset built from exactly three of the six elements.
        answer: 0
        explanation: This page teaches the underlying vocabulary (role, task, context, format, constraints,
          examples) that the ready-made templates on the Prompt Frameworks page are built from.
        written_prompt: Explain the relationship between the six prompt elements taught here and the Prompt
          Frameworks page elsewhere in this app.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'Prompt sent: "Rewrite this paragraph."

          Result: a rewrite that changed the tone to overly formal, when the requester actually wanted
          casual social-media copy.

          Which missing element best explains the mismatch?

          '
        options:
        - Role — the model needed to be told it was a copywriter.
        - Format/constraints — tone and audience were never specified, so the model assumed a formal default.
        - Context — the model didn't know what paragraph to rewrite.
        - Task — 'rewrite this paragraph' isn't a real task.
        answer: 1
        explanation: The task and context were both present and clear (there's a paragraph to rewrite);
          what's missing is the tone/audience constraint, which the model had to guess and guessed wrong.
        written_prompt: Diagnose which prompt element is missing given that the rewrite came back in the
          wrong tone, and explain how you'd add it.
      - question: 'Prompt sent: "Explain quantum entanglement."

          Result: a dense, jargon-heavy explanation, when the requester needed something a 10-year-old
          could follow.

          What''s the correct fix?

          '
        options:
        - Add a context/audience constraint, e.g. 'explain this to a curious 10-year-old with no physics
          background,' so the model doesn't default to a generic expert-level register.
        - Nothing can be done — quantum entanglement is inherently unexplainable simply.
        - Switch to a bigger model, which will automatically simplify its language.
        - Add more examples of quantum physics papers to make the answer more accurate.
        answer: 0
        explanation: The task was clear, but audience/context (who is this for) was never stated, so the
          model defaulted to a general-purpose explanation level rather than a simplified one. That's
          the missing element, not model size or paper examples.
        written_prompt: Explain why specifying the audience is the missing piece here, not switching models
          or adding technical sources.
      - question: 'A prompt reads: "Give me feedback on this business plan." The model responds with three
          lines of vague praise.

          Which combination of missing elements most plausibly explains the thin response?

          '
        options:
        - Role and constraints — without being told to act as, say, a skeptical investor and required
          to give at least 3 specific critiques, the model defaults to a safe, generic response.
        - Only the task element is missing, since 'give feedback' is not really a task.
        - This is unrelated to prompt elements — the model simply lacks the ability to critique business
          plans at all.
        - Examples are the only relevant element, and nothing else could have helped.
        answer: 0
        explanation: Feedback tasks are a classic case where an unspecified role (what perspective to
          critique from) and missing constraints (how much detail, how critical to be) let the model default
          to safe, shallow output — adding both would sharpen the result.
        written_prompt: Diagnose why the feedback came back vague, naming the specific missing elements
          and how you'd add them.
      - question: 'Two versions of the same prompt are compared:

          Version 1: "Summarize this report."

          Version 2: "Summarize this report in 5 bullet points, for a non-technical executive audience,
          highlighting only the financial risks."

          Version 2 reliably produces a more useful result. Why?

          '
        options:
        - Version 2 is simply longer, and longer prompts always produce better results regardless of content.
        - Version 2 explicitly supplies format (5 bullets), context/audience (non-technical executive),
          and constraints (financial risks only) — elements Version 1 left for the model to guess.
        - Version 2 uses more forceful, urgent language, which models respond to more reliably.
        - There's no real difference; any perceived improvement is due to random variation between requests.
        answer: 1
        explanation: The gap isn't about length or tone urgency — Version 2 fills in format, audience/context,
          and constraints that Version 1 omitted, removing exactly the guesswork the model would otherwise
          have to do.
        written_prompt: Explain, element by element, what Version 2 supplies that Version 1 leaves to
          the model's assumption.
