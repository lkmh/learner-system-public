          than an obscure, internal-only format the model has likely never seen.
        - Both teams face identical risk regardless of format familiarity.
        - Neither team faces any risk, since zero-shot always succeeds for formatting tasks.
        answer: 1
        explanation: Zero-shot's success hinges on the model already having internalized the target format
          from training — a widely-documented public standard like YAML is far safer than an obscure,
          company-internal format with no public documentation to draw on.
