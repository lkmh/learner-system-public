          of format variation, since a single example can't demonstrate multiple valid shapes.
        - One-shot and few-shot have no meaningful differences in either prep time or reliability.
        - One-shot always produces more accurate results than few-shot because there's less for the model
          to get confused by.
        answer: 1
        explanation: One-shot's single example is cheaper to write but demonstrates only one instance
          of the pattern, whereas few-shot's multiple examples reduce formatting drift at the cost of
          more prep time — that's the actual trade-off, not a blanket accuracy claim.
        written_prompt: Explain the trade-off a prompt writer is making when they choose one-shot over
          few-shot for a task with a moderately varied set of possible inputs.
    - koa: A
      assessment_mode: auto_marked
      questions:
