        - Switching to zero-shot, removing the one example entirely.
        - Keeping one-shot but writing a longer example for Vendor A.
        - This inconsistency is unrelated to example count and requires a different model.
        answer: 0
        explanation: 'This is precisely what few-shot addresses: demonstrating the pattern across the
          actual range of variation (multiple vendor formats) instead of anchoring to just one vendor''s
          specific layout.'
        written_prompt: Explain why adding examples from multiple vendors, rather than writing a longer
          single example, is the right fix here.
      - question: 'A team is deciding between one-shot and few-shot for a task that has exactly one fixed
          input/output shape that never varies across any real use case.

          Which approach makes more sense, and why?

          '
        options:
        - Few-shot, since more examples are always strictly better regardless of task variability.
        - One-shot — since the task genuinely never varies, a single example is enough to lock in the
          format, and the extra prep time few-shot requires (writing 3-4 examples) wouldn't add real benefit
          here.
        - Neither — a task with no variability should use zero-shot only.
        - Both approaches are equally wasteful for a task like this.
        answer: 1
        explanation: Few-shot's benefit comes from covering variation across examples — when a task genuinely
          has no variation, the additional examples add prep time without addressing any real formatting-drift
          risk, making one-shot the more efficient, sufficient choice.
        written_prompt: Explain why one-shot is a more efficient choice than few-shot for a task with
          a single, unvarying input/output shape.
  - module: concepts
    id: temperature
    topic: 'T12: Temperature controls how "creative" vs. predictable answers are'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: What does the temperature setting actually change about a model's output?
        options:
        - It scrambles random characters into the generated text after it's written.
        - It changes how much the model favors its single best guess for the next word versus a wider
          range of options — lower settings make output more predictable, higher settings make it more
          varied.
        - It changes the maximum length of the response the model can generate.
        - It controls how many tools the model can use at once.
        answer: 1
        explanation: Temperature changes how much weight the model gives its top guess versus other reasonable
          options — it doesn't add random garbled text or change length/tool limits.
        written_prompt: Explain, in your own words, what the temperature setting actually changes about
          how a model picks its next word.
      - question: What trade-off does raising temperature introduce?
        options:
        - Higher temperature gives less-likely, more surprising words a real shot at being picked, which
          is good for brainstorming but also more likely to wander or make mistakes.
        - Higher temperature makes the model strictly more factually accurate on every task.
        - Higher temperature has no real effect on output; it's a placebo setting with no measurable impact.
        - Higher temperature always shortens the length of the generated response.
        answer: 0
        explanation: Higher temperature flattens the distribution, allowing more variety and creativity,
          at the cost of being more prone to wandering off-topic or making mistakes.
        written_prompt: Explain the trade-off you get by raising a model's temperature setting.
      - question: At very low temperature, what happens to a model's word choices?
        options:
        - The distribution gets sharper, squeezed toward the top choice, so the model almost always picks
          the single most likely word — very consistent, repeatable answers.
        - The model becomes incapable of generating any text at all.
        - The distribution flattens out completely, giving every possible word an equal chance.
        - Low temperature causes the model to ignore the prompt and generate random unrelated text.
        answer: 0
        explanation: Low temperature sharpens the distribution toward the single most likely token, producing
          highly consistent, repeatable output.
        written_prompt: Describe what happens to a model's output at very low temperature settings, and
          why that makes it more consistent.
      - question: Is temperature best thought of as an on/off switch (either fully random or fully predictable),
          or as a dial?
        options:
        - A dial — it can be set anywhere between very predictable and very varied, not just one of two
          extremes.
        - An on/off switch — there are really only two useful settings, off and on.
        - Temperature has no adjustable range; it's a fixed setting.
        - A dial, but only for image generation, never for text.
        answer: 0
        explanation: Temperature is a continuous setting, not a binary switch — it can be dialed anywhere
          between very consistent and very varied, depending on what the task needs.
        written_prompt: Explain why temperature is better described as a dial than as an on/off switch.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'A tool that converts plain-English questions into database queries is set to a high

          temperature. The queries it generates are often inconsistent, and sometimes reference

          column names that don''t even exist.

          What''s the correct diagnosis and fix?

          '
        options:
        - Temperature is unrelated to this; the database itself must be set up wrong.
        - Temperature is too high for a task that needs precise, consistent output — lowering it would
          push the model toward its most likely, consistent answer and reduce the invented column names.
        - Temperature should be raised further to let the model be more creative about column names.
        - The model needs to be replaced with a bigger one; temperature has no bearing on this kind of
          accuracy.
        answer: 1
        explanation: Generating a database query needs precise, consistent output, which is exactly what
          low temperature supports — high temperature is the wrong setting for this task, and it's a temperature
          issue, not a database or model-size issue.
        written_prompt: Diagnose this problem and explain why lowering temperature (not raising it or
          swapping models) is the correct fix.
      - question: 'A grief-support chat line sets temperature to 0.0 to keep responses safe and predictable.

          Instead, every conversation gets the exact same canned phrases, which feels robotic and

          repetitive to returning users.

          What''s the correct diagnosis?

          '
        options:
        - Temperature 0.0 makes the model pick its single most likely response every time, which is very
          consistent but also very repetitive — this task would likely benefit from raising temperature
          a bit to add natural variety while staying coherent.
        - The model is broken and needs a restart.
        - Temperature has no effect on repetitiveness; the issue must be the prompt wording alone.
        - Temperature 0.0 is correct for this task and should not be changed.
        answer: 0
        explanation: 'This is the classic low-temperature symptom: maximum consistency at the cost of
          variety. A task needing warmth and natural variation (not exact precision) benefits from raising
          temperature a bit, unlike the database-query case which genuinely needs low temperature.'
        written_prompt: Explain why temperature 0.0 is a poor fit for this grief-support use case, contrasting
          it with a task where low temperature would be correct.
      - question: 'Two settings are tested for the same creative-writing task:

          Setting A: very low temperature — outputs are safe, similar, slightly bland across many tries.

          Setting B: very high temperature — outputs are wildly varied but sometimes incoherent or off-topic.

          Which best fits a "polished but exploratory" first-draft brainstorm, and why?

          '
        options:
        - Setting A, because low temperature always produces the highest-quality creative writing.
        - Setting B, because higher temperature is always strictly better for any creative task, regardless
          of coherence.
        - Neither setting as given — a moderate temperature between the two extremes would likely trade
          some of Setting A's blandness for some of Setting B's variety, without going as far as incoherence.
        - Temperature doesn't affect creative writing tasks at all, only factual ones.
        answer: 2
        explanation: This tests understanding of temperature as a dial, not just its extremes — the two
          extremes shown (too safe, too wild) point to a moderate middle setting as the reasoned answer,
          consistent with temperature being a dial between predictable and creative, not an on/off switch.
        written_prompt: Explain why neither extreme setting is ideal for exploratory brainstorming, and
          what setting would likely work better.
      - question: 'A legal team needs an AI tool to generate the exact same standard contract clause every

          time, word for word, for compliance reasons.

          What temperature setting fits this best, and why?

          '
        options:
        - A very high temperature, since more variety gives more legally sound options to choose from.
        - A very low temperature (near 0), since it makes the model consistently pick its most likely
          wording each time, which is what word-for-word repeatability needs.
        - Temperature doesn't matter here since it only affects creative writing, not legal text.
        - A moderate temperature, to balance consistency and creativity evenly.
        answer: 1
        explanation: When the goal is the exact same output every time, low temperature is the right setting
          — it consistently favors the model's single most likely wording instead of introducing variety.
        written_prompt: Explain why low temperature, not high or moderate, fits this compliance use case.
  - module: concepts
