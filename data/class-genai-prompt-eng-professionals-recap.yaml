        - Testing the prompt on a larger volume of tickets.
        - 'Reducing the prompt to a single word: ''Escalate.'''
        - Switching to a smaller, faster model.
        answer: 0
        explanation: This is a case where explaining the goal/context (why urgency matters, which customers
          are SLA-bound) would let the model apply better judgment on ambiguous cases the instructions
          never explicitly listed.
        written_prompt: Explain why giving the model the underlying reason urgency matters would improve
