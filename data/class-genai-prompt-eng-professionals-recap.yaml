      - question: 'A one-shot prompt is used to extract key facts from news articles, using a politics
          article as the single example. When run on a completely different domain — a sports article
          — the model tries to force in political-sounding categories that don''t apply.

          What does this illustrate, and what would help?

          '
        options:
        - This illustrates one-shot's overfitting risk on a genuinely varied task; adding a few more examples
