        - Neither approach works for tasks with more than 2 categories.
        - Both are equally reliable regardless of category count or input variety.
        answer: 1
        explanation: 'This matches the lesson directly: few-shot is suited to consistent, structured output
          across varied inputs, since extra examples reduce formatting drift that one-shot can''t catch
          on a genuinely diverse task like this one.'
        written_prompt: Explain why few-shot is the better choice for this high-variety, multi-category
          classification task.
      - question: 'A prototyping team is exploring a rough idea for a new feature and wants to test several
          different prompt approaches quickly today, without spending much time preparing examples.

          Is few-shot the right choice for this stage, and why?

          '
        options:
        - Yes — few-shot is always the fastest option regardless of preparation time needed.
        - No — few-shot requires writing 3-4 good examples, which takes real prep time; for quick prototyping,
          a faster approach (like zero-shot) may be more appropriate at this early stage.
        - Yes, because few-shot never requires any additional preparation time over zero-shot.
        - No, because few-shot can never be used during a prototyping phase for any reason.
        answer: 1
        explanation: 'The lesson notes exactly this trade-off: few-shot''s extra examples take real prep
          time, which may not be worth spending yet during quick prototyping — a case where its ''avoid
          when'' condition applies.'
        written_prompt: Explain why few-shot's example-writing overhead makes it a less ideal fit for
          this early prototyping stage.
      - question: 'A one-shot prompt for extracting structured data from invoices works well for invoices
          from Vendor A''s fixed template, but produces inconsistent field names once used on invoices
          from Vendors B, C, and D, each with a different layout.

          What change would most directly address this?

          '
        options:
        - Switching to few-shot with one example each from Vendors A, B, and C, so the extraction pattern
