        - Yes, but only because JSON is involved, unrelated to task variability.
        answer: 0
        explanation: 'One-shot is well suited exactly to this case: you need one specific output format,
          and the task doesn''t vary enough to risk overfitting to the example''s specifics.'
        written_prompt: Explain why one-shot prompting is likely sufficient for this consistent, low-variability
