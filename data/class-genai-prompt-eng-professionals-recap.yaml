        written_prompt: Explain why giving only one example risked the model overgeneralizing from that
          specific case.
      - question: 'A team needs a model to always format a response as a single JSON object with exactly
          the keys `title` and `summary`, and nothing else. The task itself (summarizing an article) doesn''t
          vary much in structure across different inputs.

          Is one-shot likely to be sufficient here?

          '
        options:
        - Yes — since the task structure barely varies and the goal is mainly locking in one specific,
