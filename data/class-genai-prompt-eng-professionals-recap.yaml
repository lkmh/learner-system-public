  - module: frameworks
    id: zero-shot
    topic: 'T1: Zero-shot prompting'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: Why does zero-shot prompting risk producing the wrong output format?
        options:
        - Because the model has no worked example to anchor the exact format, so it must guess based on
          its own prior understanding of the task.
        - Because zero-shot prompts are always too short for the model to parse correctly.
        - Because the model refuses to respond unless at least one example is provided.
        - Because zero-shot prompting disables the model's ability to follow any instructions at all.
        answer: 0
        explanation: Zero-shot relies entirely on the model's own understanding of the task and format,
          with nothing to anchor an unusual or highly specific format — that's exactly where it can guess
          wrong.
        written_prompt: In your own words, explain why a zero-shot prompt can produce an unexpected output
          format, and what would make that risk higher or lower.
      - question: A team wants the fastest possible prompt for a task the model already handles well and
          commonly. Why is zero-shot a good fit here?
        options:
        - Because zero-shot always outperforms few-shot regardless of task.
        - Because there's no setup cost and no examples to write, and the model's prior knowledge of a
          common task is already reliable enough.
        - Because zero-shot prompts are shorter and therefore always cheaper to run, which is the only
          consideration that matters.
        - Because common tasks require more examples to work correctly, so zero-shot is only for rare
          tasks.
        answer: 1
        explanation: Zero-shot's advantage is speed/no setup cost, which pays off specifically when the
          task is common and well understood by the model already — not a universal performance claim.
        written_prompt: Explain the specific situation where zero-shot prompting is the right tool, and
          why it stops being the right tool once the format gets unusual.
      - question: What is a common misconception about zero-shot prompting?
        options:
        - That it never works for any task without an example.
        - That adding one example to a zero-shot prompt turns it into one-shot, changing its risk profile.
        - That zero-shot prompts are less clear or more vague than prompts with examples, when in fact
          the instruction itself must do all the anchoring work.
        - That zero-shot means giving the model zero instructions at all, rather than zero examples.
        answer: 3
        explanation: A common confusion is thinking 'zero-shot' means no instruction is given — in fact
          the instruction is still explicit and clear; it's specifically the example count that is zero.
        written_prompt: Someone says 'zero-shot prompting means you just give the model a vague, open-ended
          request.' Correct this misunderstanding.
      - question: Why might a highly specific, unusual output format be a bad candidate for zero-shot
          prompting?
        options:
        - Because unusual formats always exceed the model's context window.
        - Because the model has nothing to anchor its guess to, so it may default to a more familiar,
          generic format instead of the specific one requested.
        - Because zero-shot prompting is incompatible with any format instructions whatsoever.
        - Because unusual formats require the Chain-of-Thought framework specifically, and no other framework
          can produce them.
        answer: 1
        explanation: With no example, the model must infer the format purely from the instruction's wording,
          and an unusual/specific shape is exactly where that inference is most likely to default to something
          generic and wrong.
        written_prompt: Explain why asking for an unusual, highly specific output format is a weak spot
          for zero-shot prompting specifically, compared to one-shot or few-shot.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'Task A: "Translate this common English sentence into French."

          Task B: "Output this data as our proprietary internal serialization format: a custom 5-symbol
          delimiter scheme unique to our company''s legacy system."

          Both are prompted zero-shot. Which is more likely to produce a wrong or invented format?

          '
        options:
        - Task A, since translation is inherently unpredictable.
        - Task B — with a highly unusual, proprietary format and zero-shot's total reliance on the model's
          own prior understanding, there's nothing to anchor a correct guess, unlike Task A's common,
          well-understood task.
        - Both are equally likely to fail.
        - Neither is likely to fail, since zero-shot always works.
        answer: 1
        explanation: Zero-shot relies entirely on the model's own understanding of the task and format.
          A common task like translation is well anchored by prior training; an obscure proprietary format
          has nothing to anchor a correct guess.
        written_prompt: Explain why Task B is a worse fit for zero-shot prompting than Task A.
      - question: 'A developer needs the model to output a JSON object with fields named exactly `cust_id`,
