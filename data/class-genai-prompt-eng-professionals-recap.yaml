      - question: 'A team ships their very first draft of a new content-moderation prompt straight to
          production without testing it against any real historical examples first.

          Within a week, they discover several categories of content it handles incorrectly.

          What best practice would have caught this before shipping?

          '
        options:
        - Iterating — testing the first draft against real examples and refining it based on where it
          falls short, rather than assuming the first version is the final one.
        - Making the prompt more polite.
