        written_prompt: Explain why using the largest available model for every task, regardless of difficulty,
          is not the recommended default.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'A startup routes every request — from simple "yes/no" content moderation checks to
          complex legal-contract analysis — through their single top-tier, most expensive model.

          Their monthly bill is unsustainable and responses feel slow even for simple checks.

          What''s the correct diagnosis and fix?

          '
        options:
        - This is correct behavior; always using the top-tier model is the recommended default regardless
          of task.
        - This is a model-tier mismatch — simple checks like yes/no moderation should be routed to a small,
          fast model, reserving the top-tier model for genuinely complex tasks like contract analysis,
          cutting cost and latency without sacrificing quality where it matters.
        - The fix is to lower the temperature setting on the top-tier model to make it cheaper.
        - The fix is to switch the top-tier model to a bigger one, which will process requests faster.
        answer: 1
        explanation: 'This is the courier/car/moving-truck mismatch directly: using the biggest, most
          expensive tier for a trivial task wastes cost and latency; matching model size to task difficulty
          (small model for simple checks, top-tier for hard reasoning) is the actual fix, not a temperature
          or further-size change.'
        written_prompt: Diagnose the startup's cost/latency problem and propose the correct model-tier
          assignment.
      - question: 'A support team assigns their fastest, smallest model to handle nuanced, ambiguous escalations
          that require multi-step reasoning about conflicting policies.

          Customers report the bot''s escalation handling feels shallow and frequently wrong.

          What''s the likely issue?

          '
        options:
        - This is also a tier mismatch, but in the opposite direction from an oversized-model problem
          — an under-powered model is assigned to a task that actually needs the deeper reasoning capability
          of a higher tier.
        - The small model must have a corrupted training dataset, unrelated to model choice.
        - The issue is the prompt's tone, not model size at all.
        - This is expected and correct; the smallest model should always be used regardless of task complexity.
        answer: 0
        explanation: 'This mirrors the same trade-off in reverse: the small/fast tier is a poor fit for
          nuanced multi-step reasoning, just as the top-tier model was overkill for a trivial task in
          the other direction — matching size to task difficulty means sometimes scaling up, not just
          always scaling down.'
        written_prompt: Diagnose why the small model is underperforming on escalations, and recommend
          a fix.
      - question: 'A team has a mixed workload: 90% simple lookups, 10% complex multi-step reasoning tasks.
          They ask whether they should pick one single model tier for all requests.

          What''s the best-grounded recommendation?

          '
        options:
        - Yes, pick whichever single tier is cheapest overall, regardless of the 10% complex tasks' needs.
        - Yes, pick the top-tier model for everything, to guarantee no request ever underperforms.
        - 'No — route based on task type: the smallest model that reliably handles the 90% of simple lookups,
          and the top-tier (or a stronger) model for the 10% that genuinely need deeper reasoning, rather
          than a single one-size-fits-all choice.'
        - It doesn't matter; model tier has no measurable effect on cost or quality at scale.
        answer: 2
        explanation: The lesson's core principle is matching model size to the specific job, not picking
          one blanket tier — a mixed workload is best served by routing simple and complex requests to
          different tiers rather than forcing a single choice for both.
        written_prompt: Recommend a model-routing strategy for this mixed workload, and justify it against
          the single-tier alternatives.
      - question: 'An engineer argues: "We should always default to the biggest model — worst case, it''s
          just a bit slower and pricier, but we''ll never get a worse answer than a smaller model would
          give."

          Evaluate this reasoning.

          '
        options:
        - The reasoning is sound; bigger models are strictly better in every dimension with no real downside.
        - The reasoning ignores that the actual downside (slower, more costly, per the lesson) is real
          and compounds at scale or under latency-sensitive use, and that a well-matched smaller model
          reliably handles many tasks just as well — so 'never worse' overlooks the cost/speed trade-off
          that's the whole point of choosing model size deliberately.
        - The reasoning is sound because smaller models always produce worse answers on every task.
        - The reasoning is irrelevant because model size doesn't affect cost at all.
        answer: 1
        explanation: The engineer's framing treats speed/cost as a negligible 'worst case,' but the lesson
          frames that trade-off as the central reason to choose deliberately — for high-volume or latency-sensitive
          tasks, that 'a bit slower and pricier' adds up and a right-sized smaller model may perform just
          as well for the actual task.
        written_prompt: Push back on the engineer's 'always default to biggest' reasoning, using the actual
          trade-offs described in the lesson.
  - module: concepts
    id: parameters-model-size
    topic: 'T14: Parameters and model size'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: What is a 'parameter' in the context of an LLM's size (e.g., '70 billion parameters')?
        options:
        - One adjustable number inside the model, learned during training, tweaked to make predictions
          slightly better each time — model size is just the total count of these numbers.
        - One single fact the model has memorized about the world.
        - One sentence from the training dataset used to teach the model.
        - One line of code in the model's software implementation.
        answer: 0
        explanation: A parameter is a single learned, adjustable weight — the model's total parameter
          count (7B, 70B, etc.) is just the sum of all these individually tunable numbers.
        written_prompt: Explain what a 'parameter' actually is, and what a model's total parameter count
          represents.
      - question: Why can't you 'delete' one specific fact from a model by editing a single parameter?
        options:
        - Because no single fact lives in one parameter you could point to — knowledge is spread across
          millions of parameters working together, each contributing to many things at once.
        - Because parameters are physically encrypted and cannot be edited under any circumstances.
        - Because deleting any parameter always destroys the entire model instantly.
        - Because facts are stored in a completely separate database from the parameters, not in the parameters
          at all.
        answer: 0
        explanation: Knowledge in an LLM is distributed across millions of parameters working in combination
          — there's no single addressable location storing one discrete fact that could be cleanly removed.
        written_prompt: Explain why you can't remove one specific fact from a trained model by editing
          a single parameter.
      - question: Is parameter count a perfect proxy for a model's overall quality?
        options:
        - No — training data and technique matter enormously too; at a given generation, bigger generally
          means more capable, slower, and more expensive, but it's not a perfect proxy.
        - Yes — parameter count alone perfectly determines quality with no exceptions.
        - No — parameter count has absolutely no relationship to capability whatsoever.
        - Yes, but only for models trained before 2020.
        answer: 0
        explanation: The material is explicit that parameter count is not a perfect proxy for quality
          — training data quality and technique matter enormously alongside raw size.
        written_prompt: Explain why parameter count alone is not a perfect predictor of a model's quality.
      - question: What is the relationship between parameter count and the trade-offs of speed and cost?
        options:
        - More parameters roughly means more capacity to store patterns and nuance, but also generally
          means more capable, slower, and more expensive.
        - More parameters always makes a model faster and cheaper to run.
        - Parameter count is completely unrelated to a model's speed or operating cost.
        - Fewer parameters always produce strictly higher-quality output than more parameters.
        answer: 0
        explanation: More parameters generally increases capacity for capturing nuance, but at the cost
          of speed and expense — the trade-off runs in the same direction as choosing a bigger model tier
          generally.
        written_prompt: Describe the general relationship between a model's parameter count and its speed/cost
          trade-offs.
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'A small model (3B parameters), fine-tuned specifically on a company''s own invoice-processing
          documents, correctly extracts invoice totals 98% of the time.

          An engineer proposes: "Let''s replace it with the biggest general-purpose model available (300B+
          parameters) — more parameters means it will definitely do better."

          Evaluate this claim.

          '
        options:
        - The claim is correct — parameter count alone reliably determines which model wins on any specific
          task.
        - The claim is questionable — a small model specifically fine-tuned for this narrow task can match
          or beat a much larger general-purpose model on that exact task, since parameter count is not
          a perfect proxy for quality on a narrow, specialized job.
        - The claim is correct because you can identify exactly which of the 300B parameters store invoice-extraction
          knowledge and copy them over.
        - The claim is irrelevant because parameter count has zero relationship to any model's capability.
        answer: 1
        explanation: 'This is the central ''bigger isn''t always better for your task'' point: a specifically-tuned
          small model on a narrow job often matches or beats a much larger general model, and parameter
          count is explicitly not a perfect quality proxy — it''s not that parameters are irrelevant,
          just not a guarantee here.'
        written_prompt: Evaluate the engineer's claim, explaining what parameter count does and doesn't
          predict for this narrow task.
      - question: 'A user complains: "This model gave me a wrong fact about a historical event. Can the
          support team just edit the one parameter storing that fact and fix it?"

          Is this a workable request?

          '
        options:
        - Yes — each fact is stored in exactly one identifiable parameter that can be directly edited.
        - No — no single fact lives in one parameter you could point to; knowledge is distributed across
          millions of parameters working together, each contributing to many different things at once,
          so there's no single number to edit to 'fix' one fact.
        - Yes, but only for models under 10 billion parameters.
        - No, because parameters cannot be modified once training is complete under any circumstances.
        answer: 1
        explanation: 'This directly tests the distributed-representation point: knowledge is spread across
          many parameters simultaneously, so there''s no single addressable ''fact parameter'' a support
          team could edit to correct one piece of information.'
        written_prompt: Explain to the user why 'just edit the parameter with that fact' isn't a workable
          request, using what you know about how knowledge is stored in a model.
      - question: 'Two models are compared on a narrow legal-clause classification task:

          Model X: 7B parameters, fine-tuned on 50,000 labeled legal clauses.

          Model Y: 400B parameters, general-purpose, no task-specific tuning.

          Model X scores higher accuracy on this specific task. What does this best illustrate?

          '
        options:
        - This is an anomaly and shouldn't be possible, since more parameters always wins.
        - This illustrates that parameter count is not a perfect proxy for quality — training data and
          technique (here, task-specific fine-tuning) matter enormously, and a smaller, well-tuned model
          can outperform a much larger general one on its specific narrow task.
        - This proves parameter count is completely meaningless and has no relationship to capability
          at all.
        - Model Y must be defective, since bigger models can never lose to smaller ones.
        answer: 1
        explanation: 'This is a direct, concrete instance of the lesson''s stated exception: while more
          parameters generally means more general capacity, task-specific training can let a much smaller
          model win on that specific task — the general rule (bigger tends to be more capable) still exists,
          it''s just not absolute.'
        written_prompt: Explain what this comparison illustrates about the relationship between parameter
          count and task-specific performance.
      - question: 'A procurement team is choosing between models purely by comparing parameter counts
          listed in each vendor''s marketing material, treating the largest number as automatically the
          best choice for their narrow customer-service ticket routing task.

          What''s the flaw in this approach?

          '
        options:
        - There is no flaw; parameter count alone is a perfectly reliable way to rank models for any task.
        - Parameter count alone ignores training data quality, technique, and task-fit — a smaller model
          properly tuned for ticket routing could match or beat the largest general model, while being
          cheaper and faster, so ranking purely by parameter count risks overpaying for capability that
          doesn't help this specific task.
        - The flaw is that parameter counts in marketing material are always fabricated and therefore
          meaningless.
        - The flaw is that parameter count only matters for image-generation models, not text models.
        answer: 1
        explanation: 'This applies the lesson''s core caution directly to a procurement decision: picking
          by raw parameter count alone, without considering fine-tuning and task fit, risks choosing an
          oversized, more expensive model that doesn''t actually perform better on the narrow task at
          hand.'
        written_prompt: Explain the flaw in ranking models purely by parameter count for this narrow ticket-routing
          task, and what the team should consider instead.
- section: Troubleshooting AI Interactions
  topics:
  - module: concepts
    id: ai-troubleshooting-framework
    topic: 'T13: Diagnostic Framework for AI Output Malfunctions'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: What is the single biggest troubleshooting mistake described for AI tool malfunctions?
        options:
        - Treating symptoms instead of finding the root cause — jumping straight to retraining the model
          or rewriting the whole prompt before actually confirming what's broken.
        - Spending too much time isolating the specific failing input before attempting any fix.
        - Testing a fix on a small number of cases before rolling it out broadly.
        - Checking whether retrieval returned the right chunks before assuming the model is at fault.
        answer: 0
        explanation: The described mistake is exactly the opposite of careful diagnosis — jumping to a
          big fix (retraining, a full rewrite) before confirming the actual root cause, rather than isolating
          and testing first.
        written_prompt: Explain the single biggest troubleshooting mistake described for diagnosing AI
          malfunctions.
      - question: What are the four steps of the diagnostic framework, in order?
        options:
        - Isolate the failure, categorize it against known failure types, test one targeted fix, confirm
          it resolved the original symptom.
        - Retrain the model, redeploy it, monitor for a week, then isolate the failure.
        - Categorize the failure, ship a fix immediately, isolate the input afterward, skip confirmation.
        - Confirm the symptom is gone, then isolate the failure, then categorize it, then test a fix.
        answer: 0
        explanation: The framework's order is isolate, categorize, test one targeted fix, then confirm
          — testing before isolating or skipping confirmation defeats the purpose of a systematic diagnosis.
        written_prompt: List the four steps of the diagnostic framework in their correct order.
      - question: Why does the framework say categorizing a failure (prompt issue vs. retrieval issue
          vs. model-capability limit vs. configuration setting) matters before attempting a fix?
        options:
        - Because each category calls for a different kind of fix — treating a retrieval problem as if
          it were a model-capability problem (or vice versa) leads to fixing the wrong thing entirely.
        - Because categorizing is only a formality with no effect on which fix is chosen.
        - Because every category of failure has exactly the same fix regardless of cause.
        - Because categorizing takes the place of testing the fix afterward.
        answer: 0
        explanation: Different failure categories need different fixes — misdiagnosing a retrieval problem
          as a model-capability problem (for example) means the actual root cause never gets addressed.
        written_prompt: Explain why correctly categorizing a failure matters before attempting a fix.
      - question: Why does the framework say this deck's specific failure categories (hallucination, bias,
          context-window loss, rate limits, etc.) aren't replaced by the framework itself?
        options:
        - Because the framework is about how to navigate between and prioritize known failure categories
          — it still requires actually knowing those categories to categorize a failure correctly in the
          first place.
        - Because the framework makes knowing any specific failure category unnecessary.
        - Because the framework only applies to failures not covered anywhere else in this curriculum.
        - Because the framework replaces the need to test any fix before shipping it.
        answer: 0
        explanation: The framework is a navigation method, not a substitute for actually knowing the specific
          failure categories — you still need that underlying knowledge to categorize a failure correctly.
        written_prompt: Explain the relationship between this general diagnostic framework and the deck's
          specific failure-category concepts.
  - module: concepts
    id: recognising-ai-pitfalls
    topic: 'T14: Common AI Pitfalls: Recognising Hallucinations, Bias, and Repetitive Responses'
    recap_questions:
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'An AI research assistant is asked to cite three academic sources for a claim. It confidently
          provides three full citations, complete with authors, years, and journal names — but none of
          the three papers actually exist.

          Which pitfall is this?

          '
        options:
        - Hallucination — a confident, plausible-sounding answer (the fabricated citations) that is simply
          not true.
        - Bias — the citations reflect a training-data skew.
        - Repetition — the model is looping the same citation structure.
        - This is a rate-limiting issue, unrelated to any of the three pitfalls.
        answer: 0
        explanation: Fabricated citations that sound real but don't exist are a textbook hallucination
          — a confident, plausible answer that isn't actually true.
        written_prompt: Diagnose this citation scenario and explain why it's a hallucination rather than
          one of the other two pitfalls.
      - question: 'An AI is asked to write a short story featuring "a CEO and their assistant meeting
          for coffee," with no further detail. It consistently writes the CEO as male and the assistant
          as female, across many separate generations, despite no gender ever being specified.

          Which pitfall is this?

          '
        options:
        - Bias — a default assumption (CEO as male, assistant as female) that reflects a skew in training
          data, not a verified fact about the prompt.
        - Hallucination — the story is fabricating false information.
        - Repetition — the model is stuck in a sampling loop.
        - This is a context-window issue, unrelated to any of the three pitfalls.
        answer: 0
        explanation: 'This is the classic bias pattern: a default gender assumption reflecting training-data
          skew, not a factual error or a sampling/repetition symptom.'
        written_prompt: Diagnose this story-writing scenario and explain why it's a bias pattern rather
          than one of the other two pitfalls.
      - question: 'A chatbot generating five different marketing taglines for the same product returns
          five taglines that are structurally almost identical ("Discover the power of ___", "Discover
          the magic of ___", "Discover the joy of ___"...), showing very little real variety.

          Which pitfall is this?

          '
        options:
        - Repetition — the model is stuck looping the same sentence structure and opening phrase, a symptom
          often tied to a sampling/temperature setting.
        - Hallucination — the taglines contain fabricated product claims.
        - Bias — the taglines reflect a demographic stereotype.
        - This is a structured-output formatting issue, unrelated to any of the three pitfalls.
        answer: 0
        explanation: Structurally near-identical outputs across multiple generations is the repetition
          pattern, typically pointing to a sampling/temperature issue rather than a factual or fairness
          problem.
        written_prompt: Diagnose this tagline-generation scenario and explain why it's a repetition pattern
          rather than one of the other two pitfalls.
      - question: 'A resume-screening tool consistently rates candidates from one particular university
          lower, even when their listed qualifications are objectively equivalent to candidates from other
          schools — a pattern traced back to how such names appeared in the model''s training data.

          Which pitfall is this, and why does it matter to correctly identify it as such rather than as
          a hallucination?

          '
        options:
        - Bias — the pattern comes from a training-data skew, not a fabricated fact, so the fix is reviewing
          and correcting the systematic skew, not simply verifying a single false claim the way a hallucination
          fix would.
        - Hallucination — the ratings must be based on a fabricated fact about the university.
        - Repetition — the model is looping the same rating value.
        - This is a rate-limiting issue and doesn't require classification as any of the three pitfalls.
        answer: 0
        explanation: This is bias — a systematic skew from training data affecting a whole group consistently,
          which needs a different fix (reviewing and correcting the pattern) than a one-off fabricated
          fact would.
        written_prompt: Diagnose this resume-screening scenario and explain why correctly identifying
          it as bias (not hallucination) changes what the appropriate fix looks like.
  - module: concepts
    id: systematic-troubleshooting
    topic: 'T15: Systematic Resolution: Step-by-Step AI Troubleshooting'
    recap_questions:
    - koa: A
      assessment_mode: auto_marked
      questions:
      - question: 'A team notices a code-generation assistant producing subtly broken code for one specific
          type of request. They haven''t yet confirmed exactly which requests trigger it, or why.

          What is the correct first step, following the standard troubleshooting procedure?

          '
        options:
        - Isolate the failure — pin down exactly which specific inputs reliably trigger the broken code
          before trying to categorize the cause or attempt any fix.
        - Immediately try switching to a different, larger model.
        - Rewrite the entire system prompt from scratch as a precaution.
        - Increase the temperature setting to see if that resolves it.
        answer: 0
        explanation: The procedure starts with isolating the failure — confirming exactly which inputs
          trigger it — before categorizing a likely cause or attempting a fix; jumping to a model swap
          or a full rewrite skips this step entirely.
        written_prompt: Explain why isolating the failing inputs should come before any fix is attempted.
      - question: 'An engineer has isolated a chatbot''s failure to a specific set of tickets, and categorized
          it as a retrieval issue — the wrong chunks are being retrieved for certain phrasing.

          Which of the following is the correct next step?

          '
        options:
        - Test one targeted fix (e.g. adjusting chunking or query rewriting) on just the isolated cases,
          then confirm those specific tickets are now retrieving the right chunks.
        - Retrain the entire underlying model from scratch.
        - Change the model, the prompt, and the retrieval settings simultaneously.
        - Ship the categorization finding as the final report with no further action.
        answer: 0
        explanation: After isolating and categorizing, the next step is testing one targeted fix on the
          isolated cases and confirming it worked — not retraining the model (unrelated to a retrieval
          issue) or changing multiple things at once.
        written_prompt: Explain the correct next step after isolating and categorizing this retrieval
          failure.
      - question: 'A team fixes a chatbot issue by changing three things at once: the system prompt, the
          temperature setting, and the underlying model version. The original symptom disappears.

          What problem does this create, according to the standard troubleshooting procedure?

          '
        options:
        - It's now impossible to know which of the three changes (if not all three) actually fixed the
          issue, making it hard to maintain, roll back selectively, or apply the same fix confidently
          elsewhere.
        - There's no problem — as long as the symptom disappeared, the specific cause doesn't matter.
        - This is the correct way to test a fix, since more changes at once means a higher chance of success.
        - This approach violates a formatting rule but has no practical downside.
        answer: 0
        explanation: Changing multiple things simultaneously means you can't attribute the fix to any
          specific change — a core problem the standard procedure's 'test one targeted change' step is
          designed to avoid.
        written_prompt: Explain what goes wrong when three changes are made simultaneously to fix an issue,
          even if the symptom disappears.
      - question: 'A team has tested a targeted fix for a malfunction on the specific isolated cases where
          it appeared, and confirmed the original symptom is now gone in those cases.

          What is the appropriate final step before considering the issue fully resolved?

          '
        options:
        - Confirm the fix doesn't introduce a new problem elsewhere (e.g. check other request types still
          behave correctly) before rolling it out more broadly, since 'confirm' means checking for new
          issues, not just that the original symptom is gone.
        - Nothing further is needed — once the original symptom is gone in the tested cases, the process
          is complete.
        - Revert the fix immediately since testing is now finished.
        - Repeat the isolate step again from scratch, ignoring the confirmed fix.
        answer: 0
        explanation: Confirming a fix means checking it resolved the original symptom without introducing
          a new one — that includes verifying unrelated cases still behave correctly before rolling the
          change out more broadly.
        written_prompt: Explain what 'confirm' should actually include before considering a fix fully
          resolved and ready to roll out.
