  - module: frameworks
    id: one-shot
    topic: 'T2: One-shot prompting'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: Why is one-shot prompting especially useful for enforcing a specific output format?
        options:
        - Because a single demonstrated example gives the model a concrete pattern to match, which is
          more reliable than describing the format in words alone.
        - Because one-shot prompts are always shorter than zero-shot prompts.
        - Because the model ignores the instruction entirely and only copies the example verbatim.
        - Because one example guarantees perfect accuracy on every subsequent input, no matter how different.
        answer: 0
        explanation: A single worked example gives the model a concrete, demonstrated pattern to imitate,
          which locks in a format more reliably than a purely verbal description — but it does not guarantee
          perfection on every future input, which rules out the overreaching claim.
        written_prompt: Explain why showing one example of the input/output pattern helps lock in a format
          better than just describing the format in words.
      - question: What is the main risk of using one-shot prompting when the real task varies a lot from
          case to case?
        options:
        - The model may overfit to the specifics of that single example, applying details that don't generalize
          to different inputs.
        - The model will refuse to process any input that doesn't match the example exactly.
        - One-shot prompts cannot handle any variation at all, even superficial wording changes.
        - The prompt will exceed the model's maximum context length.
        answer: 0
        explanation: With only one example to generalize from, the model risks anchoring too tightly to
          that example's particular details rather than the underlying pattern — that's the overfitting
          risk the framework's own guidance calls out.
        written_prompt: Describe a scenario where giving the model just one example could backfire because
          the real inputs vary too much, and explain why.
      - question: A learner believes one-shot prompting means giving the model exactly one instruction.
          What's the actual meaning?
        options:
        - One-shot means giving exactly one complete input->output example pair before the real task,
          in addition to the instruction — not restricting the number of instructions.
        - One-shot means the model gets only one attempt to answer, with no retries permitted by the API.
        - One-shot and zero-shot are the same technique with different names.
        - One-shot means the prompt must be exactly one sentence long.
        answer: 0
        explanation: '''Shot'' refers to the number of demonstrated examples, not instructions, attempts,
          or prompt length — one-shot means exactly one worked example.'
        written_prompt: 'Correct this misunderstanding: ''One-shot prompting just means keeping your prompt
          really short, like one sentence.'''
      - question: Compared to few-shot, what trade-off does one-shot make?
        options:
        - One-shot takes more prep time than few-shot but produces less consistent output.
