          further consistency gain.
        - Only exactly 3 examples work; any other count breaks the technique.
        - 10 examples would automatically convert the prompt into a fine-tuning run instead of a prompt.
        answer: 1
        explanation: Few-shot is described as 'usually 2-4' precisely because the goal is covering the
          real range of variation, not maximizing example count — past that point, extra examples mostly
          cost prep time and prompt length rather than guaranteeing further gains.
        written_prompt: Push back on the claim that 'more few-shot examples is always better.' What's
          a more accurate way to think about how many examples to include?
    - koa: A
      assessment_mode: auto_marked
      questions:
