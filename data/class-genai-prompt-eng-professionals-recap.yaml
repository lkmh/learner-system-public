          better'' technique.'
        written_prompt: Describe a situation where the extra prep time required by few-shot prompting
          outweighs the consistency benefit it offers.
      - question: What distinguishes few-shot from one-shot, beyond simply 'more examples'?
        options:
        - Few-shot examples must always contradict each other to teach robustness.
        - Few-shot typically supplies 2-4 examples specifically to demonstrate the range of the pattern
          across varied inputs, which a single one-shot example cannot show by itself.
        - Few-shot removes the instruction from the prompt entirely, relying only on examples.
        - Few-shot and one-shot are identical; the naming difference is purely stylistic.
        answer: 1
        explanation: 'The functional difference is coverage: several examples can show variation across
          cases (e.g. different urgency levels or different product types) that one single example structurally
          cannot represent.'
        written_prompt: Explain what additional teaching value a third example adds to a few-shot prompt
          that a single one-shot example could not provide on its own.
      - question: A learner assumes that using 10 examples instead of 3 will always improve a few-shot
          prompt further. What's the more accurate view?
        options:
        - More examples always linearly improve reliability with no downside, so 10 is strictly better
          than 3.
        - Few-shot's benefit comes from covering the real range of variation efficiently; beyond covering
