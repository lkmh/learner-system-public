          rather than the one example's specific domain.
        - This proves the model can never process sports articles.
        - This is unrelated to example count and is caused by the model's training data cutoff.
        - The fix is to remove all examples and use zero-shot instead.
        answer: 0
        explanation: This is a direct instance of one-shot overfitting to its single example's domain
          — since the real task varies across domains, additional varied examples (few-shot) would generalize
          the pattern better than one narrow example.
        written_prompt: Explain why the sports-article failure happened, and why adding more varied examples
          would help more than removing examples entirely.
      - question: 'Compare: Task A always produces the exact same kind of output structure regardless
          of input (e.g. always extracting a name and a date). Task B''s correct output structure varies
