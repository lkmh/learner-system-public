          Is few-shot (with 3-4 varied examples) or one-shot (with a single example) the better fit, and
          why?

          '
        options:
        - One-shot, since fewer examples are always faster to write and just as reliable.
        - Few-shot — with 8 possible categories and a wide range of input variety, several varied examples
