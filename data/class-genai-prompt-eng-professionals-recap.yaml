        written_prompt: Explain why 2-4 examples generally produce more reliable structured output than
          a single example, using the idea of 'formatting drift.'
      - question: When is few-shot prompting the wrong choice, according to its own stated trade-offs?
        options:
        - When prototyping quickly, since writing 3 good examples takes real prep time that may not be
          worth spending yet.
        - Whenever the task involves JSON output, since few-shot cannot produce structured formats.
        - When the model already performs the task well without any examples, which few-shot can never
          handle.
        - Never — few-shot is strictly better than zero-shot and one-shot in every situation.
        answer: 0
        explanation: 'Few-shot''s own trade-off is prep time: writing several good examples is real work,
