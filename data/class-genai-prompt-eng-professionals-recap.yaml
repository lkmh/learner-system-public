        - A separate piece of software that runs after the model to censor its output.
        - A setting only available through the model provider's admin dashboard, never through the prompt
          itself.
        - A guarantee that the model can never be made to violate the stated boundary.
        answer: 0
        explanation: A guardrail is a boundary written into the prompt itself — a scope limit, refusal
          condition, format lock, or exclusion — not a separate system, dashboard setting, or an unbreakable
          guarantee.
        written_prompt: Explain what a guardrail is in prompt design, and name the four common types.
      - question: Which of the following is an example of a "refusal condition" guardrail?
        options:
        - '"Only discuss our product catalog."'
        - '"If asked for legal advice, say you can''t provide it and suggest a lawyer."'
        - '"Respond using exactly three bullet points."'
        - '"Don''t mention our competitors by name."'
        answer: 1
        explanation: A refusal condition tells the model when and how to decline — the legal-advice example
          is exactly that. The others are a scope limit, a format lock, and an exclusion, respectively.
        written_prompt: Explain why the legal-advice example is a refusal condition rather than a scope
          limit or format lock.
      - question: Why are guardrails described as reducing drift rather than eliminating it entirely?
        options:
        - Because untrusted content the model reads (see Prompt injection) can still push it past a boundary
          set in the original prompt.
        - Because guardrails only work on the first message of a conversation.
        - Because guardrails are disabled automatically after 10 conversation turns.
        - Because a guardrail only applies if the user explicitly agrees to it first.
        answer: 0
        explanation: Guardrails reduce the chance of drift, but untrusted content the model later reads
          can still attempt to override them — this is exactly the risk covered under Prompt injection
          elsewhere in this deck.
        written_prompt: Explain why a guardrail written into a prompt isn't an absolute guarantee against
          unwanted output.
      - question: 'A prompt says: "You are a support assistant. Only answer questions about our software
          product." What happens if a user asks an unrelated question, like a math problem, without any
          refusal condition specified?'
        options:
        - The model's behavior is unpredictable — a scope limit alone doesn't specify what to do when
          a request falls outside it, unlike a scope limit paired with an explicit refusal condition.
        - The model will always refuse automatically, since a scope limit implies a refusal condition.
        - The model will always answer the math question correctly, since scope limits don't affect off-topic
          requests.
        - The prompt will fail to process entirely.
        answer: 0
        explanation: A scope limit alone only states what's in scope — it doesn't specify what should
          happen with an out-of-scope request unless a refusal condition is added explicitly.
