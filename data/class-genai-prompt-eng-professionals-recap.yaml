        options:
        - Because multiple examples show the range of valid variation in the pattern, reducing the chance
          the model latches onto one example's incidental specifics as if they were required.
        - Because few-shot prompts are always shorter than one-shot prompts, which models process more
          accurately.
        - Because few-shot disables the model's own prior knowledge, forcing it to rely purely on the
          examples.
        - Because more examples always means the model spends less time processing the request.
