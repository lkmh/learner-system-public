          Which task is a better fit for one-shot prompting, and why?

          '
        options:
        - Task A — a single example is enough to lock in a format that barely varies, unlike Task B, where
          one example risks anchoring the model to a structure that doesn't fit every case.
        - Task B — one-shot is specifically designed for highly variable tasks.
        - Both tasks are equally good fits for one-shot prompting.
        - Neither task is suitable for one-shot; only zero-shot applies to extraction tasks.
        answer: 0
        explanation: One-shot works best when a single example is enough to capture the pattern — that's
          Task A's low-variability case. Task B's high variability is exactly where one-shot's overfitting
          risk shows up, and few-shot would generalize better.
        written_prompt: Explain why Task A's consistency makes it a better one-shot candidate than Task
          B's variability.
  - module: frameworks
    id: few-shot
    topic: 'T3: Few-shot prompting'
    recap_questions:
    - koa: K
      assessment_mode: auto_marked
      questions:
      - question: Why does few-shot prompting generally produce more consistent structured output than
