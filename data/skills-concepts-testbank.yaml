- id: skills-1
  koa: K
  assessment_mode: auto_marked
  questions:
    - question: "Why does it matter that SKILL.md is written in Markdown rather than some AI-specific format?"
      options:
        - "Markdown was invented specifically for describing AI instructions, so it has hidden fields no other text format supports."
        - "It means a SKILL.md file is just plain text with a handful of common formatting symbols, readable and editable with any plain text editor and no special software."
        - "Markdown files must be compiled into machine code before Claude can read them."
        - "Only Claude Code (not the Desktop app) can parse Markdown files, so Skills only work in the terminal."
      answer: 1
      explanation: "Markdown is plain text plus a small set of formatting symbols (#, -, etc.) — the same everyday format used in READMEs and chat messages, requiring no special software or compilation."
      written_prompt: "Explain why the fact that SKILL.md uses plain Markdown (rather than a special AI format) is actually a useful, deliberate design choice."
    - question: "Which of these correctly describes what a `-` at the start of a Markdown line does?"
      options:
        - "It creates a numbered list item automatically incrementing from 1."
        - "It creates a bullet point."
        - "It creates a heading equivalent to `#`."
        - "It comments the line out so it is ignored by any parser."
      answer: 1
      explanation: "A leading `-` marks a bullet list item in Markdown; headings use `#`, not `-`."
      written_prompt: "Describe what a `-` and a `#` each do at the start of a line in Markdown."
    - question: "A new team member says \"I can't open SKILL.md, I don't have the right software.\" What's the accurate response?"
      options:
        - "They're right — SKILL.md requires a dedicated Skill-authoring application to open."
        - "They're mistaken — SKILL.md is plain text, so any plain text editor (or even a basic viewer) can open and display it."
        - "They're right, but only Claude Desktop can open it, not Claude Code."
        - "They're right — it requires a Markdown-to-PDF converter first."
      answer: 1
      explanation: "Since SKILL.md is just plain text with Markdown symbols, no special software is required — any text editor works."
      written_prompt: "How would you correct a colleague who believes SKILL.md needs special software to open?"
    - question: "Why is it useful that SKILL.md uses the same Markdown format as everyday READMEs and chat messages?"
      options:
        - "Because Markdown enforces strict machine-checked syntax rules that prevent all typos."
        - "Because it lowers the barrier to writing/reading a Skill — no new syntax to learn beyond what's already used elsewhere."
        - "Because Markdown files execute faster than other text formats."
        - "Because Markdown is the only format Claude's model was trained to understand at all."
      answer: 1
      explanation: "Reusing a format people already know (from READMEs, chat, etc.) means no new syntax needs to be learned to write or read a Skill."
      written_prompt: "What's the practical benefit of SKILL.md reusing a format (Markdown) people already know from elsewhere?"

- id: skills-2
  koa: K
  assessment_mode: auto_marked
  questions:
    - question: "What does an LLM do by default, without any tools, when asked to do arithmetic?"
      options:
        - "It always delegates silently to an internal calculator no matter what."
        - "It predicts likely-sounding text, which can produce wrong answers as the numbers get larger."
        - "It refuses to answer any arithmetic question outright."
        - "It queries a live math verification database before answering."
      answer: 1
      explanation: "Left alone, a model answers by predicting plausible text, including arithmetic — which is where it can go wrong on larger numbers, since it isn't actually calculating."
      written_prompt: "Explain why an LLM can get simple arithmetic wrong even though it 'knows' math facts from training."
    - question: "What is a 'tool' in the sense used when describing what a Skill organizes?"
      options:
        - "A synonym for the Skill itself — 'tool' and 'Skill' mean the same thing."
        - "A specific external action the model can invoke instead of guessing, such as a calculator or file reader."
        - "Any sentence the model generates during a conversation."
        - "A hardware requirement for running Claude Code."
      answer: 1
      explanation: "A tool is a distinct external action (calculator, file reader, search function) — separate from the Skill, which is instructions about when/how to use tools."
      written_prompt: "In your own words, define what a 'tool' is in this context, and give an example."
    - question: "A learner says: \"A Skill invents brand-new abilities the model didn't have before.\" What's wrong with this claim?"
      options:
        - "Nothing — that's exactly what a Skill does."
        - "A Skill doesn't invent new abilities; it tells the model when and how to reach for tools it already has access to."
        - "Skills only work if no tools are available at all."
        - "Skills replace tools entirely, making tools obsolete."
      answer: 1
      explanation: "A Skill organizes existing tool access — it tells the model when/how to use tools it can already reach, rather than creating new abilities from scratch."
      written_prompt: "Correct the misconception that a Skill gives a model abilities it didn't already have."
    - question: "Why is 'a calculator on the desk, not doing math in your head' a useful analogy for tool use?"
      options:
        - "Because it implies tools are optional decorations with no real function."
        - "Because it captures that the model can reach for an external, reliable mechanism instead of relying on its own internal (and fallible) prediction for that task."
        - "Because it means the model must physically stop and wait for a human to hand it a calculator."
        - "Because it implies tools always produce creative rather than precise answers."
      answer: 1
      explanation: "The analogy highlights that reaching for an external, deterministic mechanism (a tool) avoids relying on the model's own less-reliable internal prediction for tasks like arithmetic."
      written_prompt: "Explain the 'calculator on the desk' analogy in your own words and why it fits tool use."

- id: skills-3
  koa: K
  assessment_mode: auto_marked
  questions:
    - question: "What is the core difference between an API and a connector as described here?"
      options:
        - "There is no difference — they are exactly the same thing under different names."
        - "An API is the general mechanism for software to ask other software to do something; a connector is a ready-made API hookup someone already built."
        - "An API only works for email; a connector only works for chat apps."
        - "A connector is a physical cable, while an API is purely conceptual and never implemented."
      answer: 1
      explanation: "An API is the general mechanism for cross-software requests; a connector is a pre-built implementation of that mechanism for a specific app, so you don't have to wire it yourself."
      written_prompt: "Explain the difference between an API in general and a connector, using your own example."
    - question: "Without a Gmail connector, what can Claude do regarding sending an email?"
      options:
        - "Nothing at all — it cannot even discuss what it would send."
        - "It can only describe what it would send — it cannot actually send it."
        - "It can send the email but not read the inbox."
        - "It can send the email only if the user is logged into Gmail in the same browser tab."
      answer: 1
      explanation: "Without the plumbing (a connector), Claude can only describe the action; the connector is what makes actually performing it possible."
      written_prompt: "Without any connector installed, what is the actual limit on what Claude can do with an app like Gmail or Slack?"
    - question: "A teammate says: \"An API and a connector are just two words for the exact same product.\" How would you correct this?"
      options:
        - "Agree — there's no meaningful distinction worth making."
        - "Clarify that an API is the underlying mechanism for cross-software requests, while a connector is a specific, ready-made implementation of that mechanism for one particular app."
        - "Say a connector is hardware and an API is software."
        - "Say APIs are only used by Claude, and connectors are only used by humans."
      answer: 1
      explanation: "API is the general concept/mechanism; a connector is a concrete, pre-built implementation of it for a specific app — related but not identical."
      written_prompt: "How would you explain to a non-technical teammate the difference between 'an API' and 'a connector'?"
    - question: "Why does 'the plumbing that lets Claude actually do something' describe a connector well?"
      options:
        - "Because connectors are literally physical pipes installed in a building."
        - "Because, like plumbing carries water where it's needed, a connector carries a described action through to an actual effect in another piece of software."
        - "Because connectors have nothing to do with actions — they only describe intent."
        - "Because plumbing implies the connector is optional and rarely used."
      answer: 1
      explanation: "The plumbing metaphor captures that a connector is the mechanism that carries an intended action through to a real effect, rather than the action just staying descriptive."
      written_prompt: "Explain why 'plumbing' is an apt metaphor for what a connector does."

- id: skills-4
  koa: K
  assessment_mode: auto_marked
  questions:
    - question: "What problem did MCP (Model Context Protocol) solve that existed before it?"
      options:
        - "The need for AI models to have larger context windows."
        - "Every app that wanted to offer its tools to an AI needed its own custom, one-off integration; MCP replaced this with one shared standard."
        - "The lack of any way for humans to type commands to an AI."
        - "The absence of any file format for storing Skills."
      answer: 1
      explanation: "Before MCP, each app needed a bespoke integration; MCP is a shared standard connection shape that replaces those one-off builds, like USB versus proprietary cables."
      written_prompt: "Explain the problem MCP was designed to solve, in your own words."
    - question: "In the Slack MCP server example, what can an AI assistant do once connected?"
      options:
        - "Only read messages, with no ability to send or search."
        - "Search Slack messages/files/channels, read and send messages, and read or create Slack canvases — all through one standard connection."
        - "Only create new Slack workspaces."
        - "Nothing — Slack has no MCP server."
      answer: 1
      explanation: "The Slack MCP server example shows search, read/send messaging, and canvas read/create — all via the one standard MCP connection, not a custom Slack-specific build."
      written_prompt: "List what the Slack MCP server example lets an AI assistant do, and note that it's all through one standard connection."
    - question: "A colleague claims: \"MCP means every app still needs its own unique wiring to talk to an AI.\" What's the correction?"
      options:
        - "Agree — MCP hasn't changed anything about custom wiring."
        - "Correct them: MCP replaces custom, per-app wiring with one shared standard, the way USB replaced proprietary cables."
        - "Say MCP only applies to Slack and no other app."
        - "Say MCP is a marketing term with no real technical meaning."
      answer: 1
      explanation: "MCP's entire point is standardizing the connection shape so apps don't each need bespoke one-off integrations."
      written_prompt: "Correct the claim that MCP still requires unique, per-app wiring."
    - question: "Why is 'USB instead of a different proprietary cable for every device' an apt analogy for MCP?"
      options:
        - "Because MCP is literally a physical cable standard for computer hardware."
        - "Because it captures MCP's role as one common connection shape usable across many different apps, instead of a custom connection per app."
        - "Because USB and MCP have nothing meaningfully in common."
        - "Because it implies MCP only supports one app at a time, like a single USB port."
      answer: 1
      explanation: "The USB analogy illustrates a single common standard replacing many incompatible bespoke ones — exactly MCP's role for AI-tool integrations."
      written_prompt: "Explain why comparing MCP to USB (versus proprietary cables) is a fitting analogy."

