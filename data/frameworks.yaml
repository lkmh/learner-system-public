# ============================================================
# PROMPT FRAMEWORKS
# Each entry is one framework, shown in the "Prompt Frameworks"
# page. Learners pick a framework, see its structure (the
# `components` list), then pick a `theme` to see that framework
# filled in as a real example prompt.
#
# Fields:
#   id         - "zero-shot", "one-shot" and "few-shot" render as
#                a natural, unlabeled block of text (like a real
#                prompt would look). Every other id renders each
#                component as "LABEL: value" — because those
#                frameworks are explicitly structured, and showing
#                the labels helps teach the structure itself.
#   name       - shown in the framework dropdown
#   tagline    - one-line explanation shown above the dropdowns
#   best_for   - one-line: the situation this framework shines in
#   avoid_when - one-line: a situation where this framework is the
#                wrong tool, or overkill/underkill
#   components - the named parts of this framework, in the order
#                they get compiled into the final prompt
#     - label  - the component name (also the key used in each
#                theme's `values` map below — must match exactly)
#     - hint   - one-line explanation of what goes in this part
#   themes     - list of {theme, values: {label: filled-in text}}
#                one values entry per component label above.
#                Use a `|-` block scalar for any value containing
#                quotes, JSON, or multiple lines — it avoids having
#                to backslash-escape every quote mark.
#
# All 9 frameworks share the same 6 themes (the original 4 plus
# two more complex ones — Incident postmortem report and Salary
# negotiation counter-offer) so learners can compare the same
# scenario across every framework.
# ============================================================

- id: zero-shot
  name: Zero-shot prompting
  tagline: "Just describe the task directly — no examples at all. Relies entirely on the model's own understanding of the format you're asking for."
  best_for: "Quick, common tasks the model already knows well — no setup cost, no examples to write."
  avoid_when: "The output format is unusual or highly specific — with nothing to anchor it, the model will guess, and might guess wrong."
  components:
    - label: Instruction
      hint: Tell the model what task to perform, as clearly as possible.
    - label: Real input
      hint: The actual thing you want done — no example pattern to follow, just the instruction above.
  themes:
    - theme: Customer support reply
      values:
        Instruction: "Read the customer message below and write a short, empathetic reply that acknowledges the issue and explains next steps."
        Real input: |-
          Message: "My order arrived a week late and no one responded to my emails."
          Reply:
    - theme: Marketing caption
      values:
        Instruction: "Write a one-line Instagram caption for the product below."
        Real input: |-
          Product: Wireless earbuds
          Caption:
    - theme: Technical explainer
      values:
        Instruction: "Explain the technical term below in one plain-English sentence."
        Real input: |-
          Term: Cache
          Explanation:
    - theme: Travel planning
      values:
        Instruction: "Suggest one activity for the destination below."
        Real input: |-
          Destination: Lisbon
          Activity:
    - theme: Incident postmortem report
      values:
        Instruction: "Write a 3-sentence blameless summary of the incident below for an internal engineering Slack channel, focusing on impact and current status, not blame."
        Real input: |-
          Incident: API returned 500 errors for 22 minutes during peak traffic due to a database connection pool exhaustion after a deploy increased query volume.
          Summary:
    - theme: Salary negotiation counter-offer
      values:
        Instruction: "Write a polite but firm one-paragraph counter-offer email responding to the job offer details below."
        Real input: |-
          Offer: $95,000 base salary for a Senior Data Analyst role. Candidate's target: $108,000, based on 2 competing offers.
          Email:

- id: one-shot
  name: One-shot prompting
  tagline: "Give the model exactly ONE example of the input/output pattern you want before asking it to do the real task — especially useful for enforcing a specific output format."
  best_for: "You need one specific output format and a single clear example is enough to lock it in."
  avoid_when: "The task varies a lot case to case — one example won't capture the range, and the model may overfit to its specifics."
  components:
    - label: Instruction
      hint: Tell the model what task to perform.
    - label: Example
      hint: Show one input → output pair demonstrating the exact format.
    - label: Real input
      hint: The actual thing you want done, in the same format as the example.
  themes:
    - theme: Customer support reply
      values:
        Instruction: "Extract structured ticket data from the customer message below into JSON with fields: issue_type, urgency (low/medium/high), and summary."
        Example: |-
          Message: "My package hasn't arrived in 2 weeks and I need it for an event tomorrow!"
          Output:
          {
            "issue_type": "shipping_delay",
            "urgency": "high",
            "summary": "Package delayed 2 weeks, needed urgently for tomorrow's event."
          }
        Real input: |-
          Message: "The app keeps crashing every time I try to upload a photo."
          Output:
    - theme: Marketing caption
      values:
        Instruction: "Generate a structured social post for the product below with three fields: Caption, Hashtags (3), Call_to_action."
        Example: |-
          Product: Ceramic coffee mug
          Output:
          Caption: Your Monday just got a whole lot cozier.
          Hashtags: #MorningRitual #CeramicLove #SlowMornings
          Call_to_action: Shop the collection — link in bio.
        Real input: |-
          Product: Wireless earbuds
          Output:
    - theme: Technical explainer
      values:
        Instruction: "Explain the technical term below using this exact 4-field structure: Term, Plain-English definition, Analogy, Real-world example."
        Example: |-
          Term: API
          Output:
          Term: API
          Plain-English definition: A menu of requests one piece of software can make to another.
          Analogy: Like a restaurant menu — you don't need to know how the kitchen works, just what you can order.
          Real-world example: A weather app calling a weather API to get today's forecast.
        Real input: |-
          Term: Cache
          Output:
    - theme: Travel planning
      values:
        Instruction: "Suggest a one-day plan for the destination below, formatted as a markdown table with columns: Time, Activity, Note."
        Example: |-
          Destination: Rome
          Output:
          | Time | Activity | Note |
          |---|---|---|
          | Morning | Wander Trastevere | Best before crowds arrive |
          | Afternoon | Local trattoria lunch | Avoid tourist-menu spots |
          | Evening | Sunset at Gianicolo hill | Free, great view |
        Real input: |-
          Destination: Lisbon
          Output:
    - theme: Incident postmortem report
      values:
        Instruction: "Convert the incident description below into a structured postmortem entry with fields: Impact, Root cause, Resolution, Follow-up actions."
        Example: |-
          Incident: Checkout page failed to load for 15 minutes due to a CDN misconfiguration after a routine cache purge.
          Output:
          Impact: ~15 minutes of checkout downtime, an estimated 200 failed sessions.
          Root cause: A cache purge removed a required redirect rule, causing checkout assets to 404.
          Resolution: Redirect rule was restored manually; checkout confirmed working within 15 minutes.
          Follow-up actions: Add a pre-purge checklist step to verify redirect rules; add automated alerting for checkout error rate spikes.
        Real input: |-
          Incident: API returned 500 errors for 22 minutes during peak traffic due to a database connection pool exhaustion after a deploy increased query volume.
          Output:
    - theme: Salary negotiation counter-offer
      values:
        Instruction: "Write a counter-offer email using this exact structure: Opening (gratitude), Ask (the number), Justification, Close (openness to discuss)."
        Example: |-
          Offer: $70,000 for a Marketing Coordinator role.
          Output:
          Opening: Thank you so much for the offer — I'm genuinely excited about the team and the role.
          Ask: I'd like to ask if there's room to bring the base salary to $78,000.
          Justification: This reflects the market range for this role in the city and my 3 years of directly relevant campaign experience.
          Close: I'm flexible and happy to discuss further — this role is my top choice.
        Real input: |-
          Offer: $95,000 base salary for a Senior Data Analyst role. Candidate's target: $108,000, based on 2 competing offers.
          Output:

- id: few-shot
  name: Few-shot prompting
  tagline: "Give the model several examples (usually 2-4) of the input/output pattern — more examples generally means more consistent, reliable formatting, especially for complex structured output."
  best_for: "Consistent, structured output across varied inputs — the extra examples reduce formatting drift that one-shot can't catch."
  avoid_when: "You're prototyping quickly — writing 3 good examples takes real prep time you might not want to spend yet."
  components:
    - label: Instruction
      hint: Tell the model what task to perform.
    - label: Example 1
      hint: First input → output example.
    - label: Example 2
      hint: Second input → output example.
    - label: Example 3
      hint: Third input → output example.
    - label: Real input
      hint: The actual thing you want done, in the same format as the examples.
  themes:
    - theme: Customer support reply
      values:
        Instruction: "Extract structured ticket data from the customer message below into JSON with fields: issue_type, urgency (low/medium/high), and summary."
        Example 1: |-
          Message: "My package hasn't arrived in 2 weeks and I need it for an event tomorrow!"
          Output:
          {
            "issue_type": "shipping_delay",
            "urgency": "high",
            "summary": "Package delayed 2 weeks, needed urgently for tomorrow's event."
          }
        Example 2: |-
          Message: "I was charged twice for the same order."
          Output:
          {
            "issue_type": "billing_error",
            "urgency": "medium",
            "summary": "Customer was double-charged for one order."
          }
        Example 3: |-
          Message: "Just wanted to say the new packaging looks great!"
          Output:
          {
            "issue_type": "feedback",
            "urgency": "low",
            "summary": "Positive feedback about the new packaging design."
          }
        Real input: |-
          Message: "The app keeps crashing every time I try to upload a photo."
          Output:
    - theme: Marketing caption
      values:
        Instruction: "Generate a structured social post for the product below with three fields: Caption, Hashtags (3), Call_to_action."
        Example 1: |-
          Product: Ceramic coffee mug
          Output:
          Caption: Your Monday just got a whole lot cozier.
          Hashtags: #MorningRitual #CeramicLove #SlowMornings
          Call_to_action: Shop the collection — link in bio.
        Example 2: |-
          Product: Yoga mat
          Output:
          Caption: Find your center, one stretch at a time.
          Hashtags: #YogaEveryday #MindfulMovement #FlexibleLiving
          Call_to_action: Roll one out today — link in bio.
        Example 3: |-
          Product: Scented candle
          Output:
          Caption: Light it up, let go of the day.
          Hashtags: #CandleMoments #CozyNights #SelfCare
          Call_to_action: Grab yours before they're gone.
        Real input: |-
          Product: Wireless earbuds
          Output:
    - theme: Technical explainer
      values:
        Instruction: "Explain the technical term below using this exact 4-field structure: Term, Plain-English definition, Analogy, Real-world example."
        Example 1: |-
          Term: API
          Output:
          Term: API
          Plain-English definition: A menu of requests one piece of software can make to another.
          Analogy: Like a restaurant menu — you don't need to know how the kitchen works, just what you can order.
          Real-world example: A weather app calling a weather API to get today's forecast.
        Example 2: |-
          Term: Bandwidth
          Output:
          Term: Bandwidth
          Plain-English definition: How much data can move through a connection at once.
          Analogy: Like lanes on a highway — more lanes, more cars per minute.
          Real-world example: A video call needs more bandwidth than sending a text message.
        Example 3: |-
          Term: Encryption
          Output:
          Term: Encryption
          Plain-English definition: Scrambling data so only someone with the right key can read it.
          Analogy: Like a locked diary only you have the key to.
          Real-world example: Your banking app encrypts your login details before sending them over the internet.
        Real input: |-
          Term: Cache
          Output:
    - theme: Travel planning
      values:
        Instruction: "Suggest a one-day plan for the destination below, formatted as a markdown table with columns: Time, Activity, Note."
        Example 1: |-
          Destination: Rome
          Output:
          | Time | Activity | Note |
          |---|---|---|
          | Morning | Wander Trastevere | Best before crowds arrive |
          | Afternoon | Local trattoria lunch | Avoid tourist-menu spots |
          | Evening | Sunset at Gianicolo hill | Free, great view |
        Example 2: |-
          Destination: Tokyo
          Output:
          | Time | Activity | Note |
          |---|---|---|
          | Morning | Tsukiji Outer Market breakfast | Go early, it gets crowded |
          | Afternoon | Shimokitazawa vintage shops | Skip the mainstream districts |
          | Evening | Izakaya crawl in a back alley | Ask locals, not guidebooks |
        Example 3: |-
          Destination: Marrakech
          Output:
          | Time | Activity | Note |
          |---|---|---|
          | Morning | Get lost in the souks | Bargaining is expected |
          | Afternoon | Mint tea at a rooftop cafe | Best midday break from the heat |
          | Evening | Sunset at Jemaa el-Fnaa | Arrive before dark for full effect |
        Real input: |-
          Destination: Lisbon
          Output:
    - theme: Incident postmortem report
      values:
        Instruction: "Convert the incident description below into a structured postmortem entry with fields: Impact, Root cause, Resolution, Follow-up actions."
        Example 1: |-
          Incident: Checkout page failed to load for 15 minutes due to a CDN misconfiguration after a routine cache purge.
          Output:
          Impact: ~15 minutes of checkout downtime, an estimated 200 failed sessions.
          Root cause: A cache purge removed a required redirect rule, causing checkout assets to 404.
          Resolution: Redirect rule was restored manually; checkout confirmed working within 15 minutes.
          Follow-up actions: Add a pre-purge checklist step to verify redirect rules; add automated alerting for checkout error rate spikes.
        Example 2: |-
          Incident: Email notifications were delayed by 3 hours for all users after a queue worker crashed and didn't restart automatically.
          Output:
          Impact: All email notifications delayed ~3 hours; no data lost, just late delivery.
          Root cause: A queue worker process crashed on an unhandled exception and had no auto-restart configured.
          Resolution: Worker was restarted manually; backlog cleared within 40 minutes.
          Follow-up actions: Add auto-restart on crash for all queue workers; add alerting on queue depth exceeding a threshold.
        Example 3: |-
          Incident: Search results returned stale data for 6 hours after the search index failed to refresh following a schema change.
          Output:
          Impact: Users saw outdated product listings in search for 6 hours; no impact to direct product pages.
          Root cause: A schema change wasn't backward-compatible with the search indexer, silently failing each refresh cycle.
          Resolution: Rolled back the schema change and manually triggered a full re-index.
          Follow-up actions: Add a compatibility check to the schema-change deploy pipeline; add alerting when index refresh fails.
        Real input: |-
          Incident: API returned 500 errors for 22 minutes during peak traffic due to a database connection pool exhaustion after a deploy increased query volume.
          Output:
    - theme: Salary negotiation counter-offer
      values:
        Instruction: "Write a counter-offer email using this exact structure: Opening (gratitude), Ask (the number), Justification, Close (openness to discuss)."
        Example 1: |-
          Offer: $70,000 for a Marketing Coordinator role.
