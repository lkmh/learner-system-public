<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall of Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F8F9F9; --paper:#FFFFFF; --ink:#212427; --muted:#757F8A;
    --border:#C8CCD0;
    --brand:#134479;
    --navy-50:#EDF5FC; --navy-100:#D3E5F8;
    --orange:#EEA62B;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
    line-height:1.5;
  }
  h1{font-family:'Space Grotesk','Inter',sans-serif; margin:0;}
  header{
    max-width:1200px; margin:0 auto; padding:48px 20px 8px; text-align:center;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:0.78rem; color:var(--muted);
    text-transform:uppercase; letter-spacing:.06em; margin:0 0 6px;
  }
  header h1{ font-size:2rem; margin-bottom:6px; color:var(--brand); letter-spacing:-0.01em; }
  header p{ color:var(--muted); }

  #grid{
    max-width:1200px; margin:0 auto; padding:24px 20px 60px;
    columns:3 280px; column-gap:16px;
  }
  @media (max-width:640px){ #grid{ columns:1; } }

  .card{
    break-inside:avoid;
    background:var(--paper); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; margin-bottom:16px;
  }
  .card .quote{ font-size:0.95rem; line-height:1.55; margin:0 0 14px; color:var(--ink); }
  .card .person{ display:flex; align-items:center; gap:10px; }
  .avatar{
    width:40px; height:40px; border-radius:50%; background:var(--navy-100);
    background-size:cover; background-position:center; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-weight:600; font-size:0.85rem; color:var(--brand);
    font-family:'Space Grotesk',sans-serif;
  }
  .person .name{ font-weight:600; font-size:0.92rem; font-family:'Space Grotesk',sans-serif; color:var(--brand); }
  .person .role{ color:var(--muted); font-size:0.82rem; }
  .stars{ color:var(--orange); font-size:0.85rem; letter-spacing:1px; margin-bottom:8px; }
  .class-tag{
    display:inline-block; margin-top:6px; padding:2px 8px; border-radius:999px;
    background:var(--navy-50); color:var(--brand); font-size:0.72rem; font-weight:500;
  }

  #empty, #loading{ text-align:center; color:var(--muted); padding:40px 20px; }
</style>
</head>
<body>
<header>
  <p class="eyebrow">LKX · Testimonials</p>
  <h1>Wall of Love</h1>
  <p>What learners are saying</p>
</header>

<div id="loading">Loading testimonials…</div>
<div id="empty" style="display:none">No testimonials yet — be the first!</div>
<div id="grid"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const grid = document.getElementById('grid');
  const loadingEl = document.getElementById('loading');
  const emptyEl = document.getElementById('empty');

  function initials(name) {
    return name.split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  function starString(n) {
    const count = Math.max(0, Math.min(5, Number(n) || 0));
    return '★'.repeat(count) + '☆'.repeat(5 - count);
  }

  function renderCard(t) {
    const card = document.createElement('div');
    card.className = 'card';

    const avatar = t.photo_url
      ? `<div class="avatar" style="background-image:url('${escapeHtml(t.photo_url)}')"></div>`
      : `<div class="avatar">${escapeHtml(initials(t.name))}</div>`;

    const roleLine = [t.title, t.company].filter(Boolean).map(escapeHtml).join(', ');

    card.innerHTML = `
      <div class="stars">${starString(t.stars)}</div>
      <p class="quote">"${escapeHtml(t.quote)}"</p>
      <div class="person">
        ${avatar}
        <div>
          <div class="name">${escapeHtml(t.name)}</div>
          ${roleLine ? `<div class="role">${roleLine}</div>` : ''}
          ${t.class_attended ? `<div class="class-tag">${escapeHtml(t.class_attended)}</div>` : ''}
        </div>
      </div>
    `;
    return card;
  }

  async function load() {
    const { data, error } = await supabase
      .from('testimonials')
      .select('name, title, company, class_attended, stars, quote, photo_url, created_at')
      .eq('approved', true)
      .order('created_at', { ascending: false });

    loadingEl.style.display = 'none';

    if (error) {
      loadingEl.style.display = 'block';
      loadingEl.textContent = 'Could not load testimonials.';
      console.error(error);
      return;
    }

    if (!data || data.length === 0) {
      emptyEl.style.display = 'block';
      return;
    }

    for (const t of data) {
      grid.appendChild(renderCard(t));
    }
  }

  load();
</script>
</body>
</html>
